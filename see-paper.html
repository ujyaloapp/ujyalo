<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEE Past Paper | Ujyalo</title>
  <meta name="description" content="SEE past paper — free bilingual Nepali and English. Step-by-step model answers." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,700;9..144,1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand: #2563EB;
      --green: #1D9E75;
      --dark: #0a0f1e;
      --ink: #0f172a;
      --mid: #475569;
      --light: #94a3b8;
      --border: #e2e8f0;
      --bg: #f8fafc;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TOP BAR ── */
    .topbar {
      background: var(--dark);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      height: 56px;
      flex-shrink: 0;
      z-index: 10;
    }
    .tb-back {
      display: flex; align-items: center; gap: 6px;
      color: rgba(255,255,255,.6); font-size: 13px; font-weight: 600;
      background: rgba(255,255,255,.08); border: none; border-radius: 8px;
      padding: 6px 12px; cursor: pointer; font-family: inherit;
      transition: all .2s; text-decoration: none; flex-shrink: 0;
    }
    .tb-back:hover { background: rgba(255,255,255,.14); color: white; }
    .tb-divider { width: 1px; height: 24px; background: rgba(255,255,255,.12); flex-shrink: 0; }
    .tb-info { flex: 1; min-width: 0; }
    .tb-title { font-size: 14px; font-weight: 700; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tb-sub { font-size: 11px; color: rgba(255,255,255,.4); margin-top: 1px; }
    .tb-lang { display: flex; background: rgba(255,255,255,.08); border-radius: 8px; padding: 3px; gap: 2px; flex-shrink: 0; }
    .tb-lang-btn {
      padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: 700;
      border: none; cursor: pointer; font-family: inherit; transition: all .2s;
      color: rgba(255,255,255,.5); background: transparent;
    }
    .tb-lang-btn.active { background: white; color: var(--ink); }
    .tb-dl {
      display: flex; align-items: center; gap: 6px;
      background: #f59e0b; color: #0a0f1e;
      border: none; border-radius: 8px; padding: 7px 14px;
      font-size: 12px; font-weight: 800; cursor: pointer;
      font-family: inherit; transition: all .2s; flex-shrink: 0;
      text-decoration: none;
    }
    .tb-dl:hover { background: #d97706; }

    /* ── MAIN LAYOUT ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── LEFT PANEL — question list ── */
    .q-list {
      width: 480px;
      flex-shrink: 0;
      background: white;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    /* Paper header inside left panel */
    .paper-header {
      background: white;
      border-bottom: 2px solid var(--ink);
      padding: 20px 20px 16px;
      text-align: center;
      flex-shrink: 0;
    }
    .ph-exam { font-family: 'Fraunces', serif; font-size: 14px; font-weight: 700; color: var(--ink); }
    .ph-subject { font-family: 'Fraunces', serif; font-size: 17px; font-weight: 700; color: var(--ink); margin: 2px 0; }
    .ph-subject-np { font-family: 'Noto Sans Devanagari', sans-serif; font-size: 13px; color: var(--mid); margin-bottom: 8px; }
    .ph-badge { display: inline-flex; align-items: center; gap: 5px; background: var(--dark); color: white; font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 999px; margin-bottom: 10px; }
    .ph-meta { display: flex; justify-content: space-between; font-size: 11px; font-weight: 700; color: var(--ink); border-top: 1px solid var(--border); padding-top: 10px; margin-top: 4px; }
    .ph-instructions {
      background: #EFF6FF; border-left: 3px solid var(--brand);
      padding: 8px 12px; margin: 12px 20px 0;
      border-radius: 0 6px 6px 0;
      font-size: 11px; color: var(--mid); line-height: 1.6;
    }
    .ph-instr-np { font-family: 'Noto Sans Devanagari', sans-serif; font-size: 11px; margin-bottom: 3px; font-style: italic; }
    .ph-all { font-weight: 700; color: var(--ink); font-size: 12px; margin-top: 4px; }

    /* Question items */
    .q-items { padding: 12px 0 24px; }

    .q-parent {
      padding: 10px 20px 4px;
      border-top: 1px solid var(--border);
      margin-top: 4px;
    }
    .q-parent:first-child { border-top: none; margin-top: 0; }
    .q-parent-num { font-size: 13px; font-weight: 800; color: var(--ink); margin-bottom: 2px; display: flex; align-items: baseline; gap: 8px; }
    .q-parent-text-en { font-size: 12px; color: var(--mid); line-height: 1.6; }
    .q-parent-text-np { font-family: 'Noto Sans Devanagari', sans-serif; font-size: 12px; color: var(--ink); line-height: 1.7; margin-bottom: 3px; display: none; }

    .q-sub-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 8px 20px 8px 32px;
      cursor: pointer; transition: background .15s;
      border-radius: 0;
    }
    .q-sub-item:hover { background: #f8fafc; }
    .q-sub-item.active { background: #EFF6FF; border-right: 3px solid var(--brand); }
    .q-sub-letter {
      width: 24px; height: 24px; border-radius: 50%;
      background: #f1f5f9; color: var(--mid);
      font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all .15s;
    }
    .q-sub-item.active .q-sub-letter { background: var(--brand); color: white; }
    .q-sub-content { flex: 1; min-width: 0; }
    .q-sub-text-en { font-size: 12px; color: var(--mid); line-height: 1.5; }
    .q-sub-text-np { font-family: 'Noto Sans Devanagari', sans-serif; font-size: 12px; color: var(--ink); line-height: 1.6; display: none; }
    .q-sub-item.active .q-sub-text-en { color: var(--ink); }
    .q-sub-marks {
      font-size: 10px; font-weight: 700; color: white;
      background: var(--light); border-radius: 999px;
      padding: 2px 7px; flex-shrink: 0; margin-top: 2px;
    }
    .q-sub-item.active .q-sub-marks { background: var(--brand); }

    /* ── RIGHT PANEL — answer ── */
    .answer-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    .answer-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
    }
    .answer-empty-icon { font-size: 56px; margin-bottom: 16px; opacity: .4; }
    .answer-empty-title { font-family: 'Fraunces', serif; font-size: 1.4rem; font-weight: 700; color: var(--ink); margin-bottom: 8px; opacity: .4; }
    .answer-empty-sub { font-size: 14px; color: var(--light); }

    .answer-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: none;
    }
    .answer-content.visible { display: block; }

    .ac-q-label { font-size: 10px; font-weight: 700; color: var(--light); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 8px; }
    .ac-q-num { font-size: 13px; font-weight: 800; color: var(--brand); margin-bottom: 4px; }

    .ac-question {
      background: white; border: 1px solid var(--border);
      border-radius: 14px; padding: 18px 20px; margin-bottom: 16px;
    }
    .ac-q-text-en { font-size: 14px; color: var(--ink); line-height: 1.7; }
    .ac-q-text-np { font-family: 'Noto Sans Devanagari', sans-serif; font-size: 14px; color: var(--ink); line-height: 1.8; display: none; }
    .ac-marks { display: inline-flex; align-items: center; gap: 4px; background: #EFF6FF; color: var(--brand); font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 999px; margin-top: 10px; }

    .ac-answer {
      background: white; border: 1px solid #bbf7d0;
      border-top: 3px solid var(--green);
      border-radius: 14px; overflow: hidden;
    }
    .ac-answer-header {
      background: var(--green); padding: 10px 18px;
      display: flex; align-items: center; gap: 8px;
    }
    .ac-answer-label { font-size: 11px; font-weight: 700; color: white; text-transform: uppercase; letter-spacing: .08em; }
    .ac-answer-body {
      padding: 18px 20px;
      font-size: 14px; color: #065f46;
      line-height: 1.9; white-space: pre-wrap;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    /* nav between questions */
    .ac-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px; border-top: 1px solid var(--border);
      background: white; flex-shrink: 0;
    }
    .ac-nav-info { font-size: 12px; color: var(--light); font-weight: 600; }
    .ac-nav-btns { display: flex; gap: 8px; }
    .ac-nav-btn {
      padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 700;
      border: none; cursor: pointer; font-family: inherit; transition: all .2s;
    }
    .ac-nav-prev { background: #f1f5f9; color: var(--mid); }
    .ac-nav-prev:hover { background: var(--border); }
    .ac-nav-next { background: var(--brand); color: white; }
    .ac-nav-next:hover { background: #1d4ed8; }
    .ac-nav-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── LOADING ── */
    .loading-screen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--light); font-weight: 600; }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      body { overflow: auto; }
      .main { flex-direction: column; overflow: auto; height: auto; }
      .q-list { width: 100%; border-right: none; border-bottom: 1px solid var(--border); overflow: visible; }
      .answer-panel { min-height: 60vh; overflow: auto; }
      .answer-content { display: block; min-height: 400px; }
      .answer-empty { display: none; }
      .ac-nav { position: sticky; bottom: 0; }
      .tb-dl span { display: none; }
    }

    @media print {
      .topbar { display: none; }
      body { height: auto; overflow: auto; background: white; }
      .main { flex-direction: column; height: auto; overflow: visible; }
      .q-list { width: 100%; overflow: visible; border: none; }
      .answer-panel { display: none; }
    }
  </style>
</head>
<body>

<!-- Loading -->
<div class="loading-screen" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Loading paper...</div>
</div>

<!-- Top bar -->
<div class="topbar">
  <a href="/see.html?mode=past-papers" class="tb-back">← Back</a>
  <div class="tb-divider"></div>
  <div class="tb-info">
    <div class="tb-title" id="tb-title">Loading...</div>
    <div class="tb-sub" id="tb-sub"></div>
  </div>
  <div class="tb-lang">
    <button class="tb-lang-btn active" id="btn-en" onclick="setLang('en')">🇬🇧 English</button>
    <button class="tb-lang-btn" id="btn-np" onclick="setLang('np')">🇳🇵 नेपाली</button>
  </div>
  <button class="tb-dl" onclick="window.print()">⬇ <span>Download PDF</span></button>
</div>

<!-- Main -->
<div class="main">

  <!-- Left: question list -->
  <div class="q-list" id="q-list">
    <div class="paper-header" id="paper-header"></div>
    <div class="q-items" id="q-items"></div>
  </div>

  <!-- Right: answer panel -->
  <div class="answer-panel">
    <div class="answer-empty" id="answer-empty">
      <div class="answer-empty-icon">👈</div>
      <div class="answer-empty-title">Select a question</div>
      <div class="answer-empty-sub">Click any question on the left to see the model answer</div>
    </div>
    <div class="answer-content" id="answer-content"></div>
    <div class="ac-nav" id="ac-nav" style="display:none;">
      <div class="ac-nav-info" id="ac-nav-info"></div>
      <div class="ac-nav-btns">
        <button class="ac-nav-btn ac-nav-prev" id="btn-prev" onclick="navQuestion(-1)">← Prev</button>
        <button class="ac-nav-btn ac-nav-next" id="btn-next" onclick="navQuestion(1)">Next →</button>
      </div>
    </div>
  </div>

</div>

<script>
// ════════════════════════════════════════════════════════
// SEE PAPER PAGE
// Fetches from Supabase, renders bilingual paper
// URL: /see-paper.html?paper_id=UUID
//   or /see/past-papers/2082/koshi/maths
// ════════════════════════════════════════════════════════

let LANG = 'en';
let PAPER = null;
let QUESTIONS = [];
let FLAT_SUBS = []; // flat list of sub-parts only for navigation
let ACTIVE_IDX = -1;

// ── Get paper ID from URL ─────────────────────────────
function getPaperParams() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('paper_id')) return { by: 'id', value: params.get('paper_id') };

  // Parse /see/past-papers/2082/koshi/maths
  const path = window.location.pathname;
  const match = path.match(/\/see\/past-papers\/(\d+)\/([^\/]+)\/([^\/]+)/);
  if (match) return { by: 'slug', year: match[1], province: match[2], subject: match[3] };

  // Fallback — default to our paper for testing
  return { by: 'id', value: '7ba8eb9e-00ff-4f94-8500-261c51ca4fec' };
}

// ── Fetch from Supabase ───────────────────────────────
async function fetchPaper() {
  const SUPABASE_URL = await getSupabaseUrl();
  const ANON_KEY = await getAnonKey();
  const p = getPaperParams();

  let paperUrl;
  if (p.by === 'id') {
    paperUrl = `${SUPABASE_URL}/rest/v1/past_papers?id=eq.${p.value}&select=*`;
  } else {
    // Get subject_id first
    const subjRes = await fetch(
      `${SUPABASE_URL}/rest/v1/exam_subjects?code=eq.${p.subject}&select=id,name,name_nepali`,
      { headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${ANON_KEY}` } }
    );
    const subjData = await subjRes.json();
    if (!subjData[0]) throw new Error('Subject not found');
    const subjId = subjData[0].id;

    paperUrl = `${SUPABASE_URL}/rest/v1/past_papers?subject_id=eq.${subjId}&year=eq.${p.year}&province=eq.${p.province}&select=*`;
  }

  const [paperRes, questionsRes] = await Promise.all([
    fetch(paperUrl, { headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${ANON_KEY}` } }),
    fetch(
      `${SUPABASE_URL}/rest/v1/past_paper_questions?paper_id=eq.${p.by === 'id' ? p.value : 'TBD'}&order=question_number.asc,sub_part.asc&select=*`,
      { headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${ANON_KEY}` } }
    )
  ]);

  const paperData = await paperRes.json();
  if (!paperData[0]) throw new Error('Paper not found');
  PAPER = paperData[0];

  // Fetch questions with paper id
  const qRes = await fetch(
    `${SUPABASE_URL}/rest/v1/past_paper_questions?paper_id=eq.${PAPER.id}&order=question_number.asc,sub_part.asc&select=*`,
    { headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${ANON_KEY}` } }
  );
  QUESTIONS = await qRes.json();

  // Also get subject info
  const sRes = await fetch(
    `${SUPABASE_URL}/rest/v1/exam_subjects?id=eq.${PAPER.subject_id}&select=name,name_nepali,code`,
    { headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${ANON_KEY}` } }
  );
  const sData = await sRes.json();
  PAPER.subject_name = sData[0]?.name || 'Mathematics';
  PAPER.subject_name_np = sData[0]?.name_nepali || 'गणित';
}

async function getSupabaseUrl() {
  const res = await fetch('/api/auth?action=config');
  const data = await res.json();
  return data.url;
}
async function getAnonKey() {
  const res = await fetch('/api/auth?action=config');
  const data = await res.json();
  return data.anon_key;
}

// ── Render ────────────────────────────────────────────
function render() {
  // Update top bar
  document.getElementById('tb-title').textContent = `${PAPER.subject_name} · SEE ${PAPER.year}`;
  document.getElementById('tb-sub').textContent = `${PAPER.province} Province · Full marks: ${PAPER.total_marks}`;
  document.title = `SEE ${PAPER.year} ${PAPER.province} ${PAPER.subject_name} | Ujyalo`;

  renderPaperHeader();
  renderQuestionList();
}

function renderPaperHeader() {
  const el = document.getElementById('paper-header');
  el.innerHTML = `
    <div class="ph-exam">SEE ${PAPER.year} (${PAPER.year > 2080 ? parseInt(PAPER.year) - 56 + ' AD' : ''})</div>
    <div class="ph-subject">Compulsory ${PAPER.subject_name}</div>
    <div class="ph-subject-np">${PAPER.subject_name_np ? 'अनिवार्य ' + PAPER.subject_name_np : ''}</div>
    <div><span class="ph-badge">🏔 ${PAPER.province} Province</span></div>
    <div class="ph-meta">
      <span>Time: ${PAPER.time_minutes/60} Hours</span>
      <span>Full Marks: ${PAPER.total_marks}</span>
    </div>
  `;

  // Instructions
  if (PAPER.instructions_english || PAPER.instructions_nepali) {
    const instr = document.createElement('div');
    instr.className = 'ph-instructions';
    instr.innerHTML = `
      <div class="ph-instr-np" id="instr-np" style="display:${LANG==='np'?'block':'none'}">${PAPER.instructions_nepali || ''}</div>
      <div id="instr-en" style="display:${LANG==='en'?'block':'none'};font-style:italic;font-size:11px;color:var(--mid);">${PAPER.instructions_english || ''}</div>
      <div class="ph-all">All questions are compulsory.</div>
    `;
    el.appendChild(instr);
  }
}

function renderQuestionList() {
  // Group questions by question_number
  const groups = {};
  QUESTIONS.forEach(q => {
    const num = q.question_number;
    if (!groups[num]) groups[num] = { parent: null, subs: [] };
    if (!q.sub_part) groups[num].parent = q;
    else groups[num].subs.push(q);
  });

  // Build flat subs list for navigation
  FLAT_SUBS = [];
  Object.values(groups).forEach(g => {
    g.subs.forEach(s => FLAT_SUBS.push(s));
  });

  const container = document.getElementById('q-items');
  let html = '';

  Object.entries(groups).sort((a,b) => parseInt(a[0]) - parseInt(b[0])).forEach(([num, g]) => {
    const parent = g.parent;
    const parentTextEn = parent?.question_text_english || '';
    const parentTextNp = parent?.question_text_nepali || '';

    html += `<div class="q-parent">
      <div class="q-parent-num">${num}.</div>
      <div class="q-parent-text-np" id="pnp-${num}">${parentTextNp}</div>
      <div class="q-parent-text-en" id="pen-${num}">${parentTextEn}</div>
    </div>`;

    g.subs.forEach(sub => {
      const idx = FLAT_SUBS.indexOf(sub);
      const textEn = sub.question_text_english || '';
      const textNp = sub.question_text_nepali || '';
      html += `
      <div class="q-sub-item" id="sub-${sub.id}" onclick="selectQuestion(${idx})">
        <div class="q-sub-letter">${sub.sub_part}</div>
        <div class="q-sub-content">
          <div class="q-sub-text-np" id="snp-${sub.id}">${textNp}</div>
          <div class="q-sub-text-en" id="sen-${sub.id}">${textEn}</div>
        </div>
        <div class="q-sub-marks">${sub.marks}m</div>
      </div>`;
    });
  });

  container.innerHTML = html;
  applyLang();
}

function selectQuestion(idx) {
  if (idx < 0 || idx >= FLAT_SUBS.length) return;
  ACTIVE_IDX = idx;
  const q = FLAT_SUBS[idx];

  // Update active state in list
  document.querySelectorAll('.q-sub-item').forEach(el => el.classList.remove('active'));
  const activeEl = document.getElementById(`sub-${q.id}`);
  if (activeEl) {
    activeEl.classList.add('active');
    activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  // Show answer panel
  document.getElementById('answer-empty').style.display = 'none';
  document.getElementById('ac-nav').style.display = 'flex';
  const content = document.getElementById('answer-content');
  content.classList.add('visible');

  // Get parent question text
  const parentQ = QUESTIONS.find(pq => pq.question_number === q.question_number && !pq.sub_part);
  const parentTextEn = parentQ?.question_text_english || '';
  const parentTextNp = parentQ?.question_text_nepali || '';

  const qTextEn = q.question_text_english || '';
  const qTextNp = q.question_text_nepali || '';
  const answer = q.answer_text || 'Model answer coming soon.';

  content.innerHTML = `
    <div class="ac-q-label">Question ${q.question_number}(${q.sub_part})</div>

    <div class="ac-question">
      ${parentTextNp || parentTextEn ? `
        <div style="font-size:12px;color:var(--light);margin-bottom:8px;font-weight:600;">Context</div>
        <div class="ac-q-text-np" id="ctx-np" style="display:${LANG==='np'?'block':'none'};font-size:13px;margin-bottom:6px;">${parentTextNp}</div>
        <div id="ctx-en" style="display:${LANG==='en'?'block':'none'};font-size:13px;color:var(--mid);margin-bottom:10px;line-height:1.6;">${parentTextEn}</div>
        <div style="height:1px;background:var(--border);margin-bottom:10px;"></div>
      ` : ''}
      <div class="ac-q-text-np" id="q-np" style="display:${LANG==='np'?'block':'none'}">${qTextNp}</div>
      <div class="ac-q-text-en" id="q-en" style="display:${LANG==='en'?'block':'none'}">${qTextEn}</div>
      <div class="ac-marks">📋 ${q.marks} mark${q.marks !== 1 ? 's' : ''}</div>
    </div>

    <div class="ac-answer">
      <div class="ac-answer-header">
        <span style="font-size:14px;">✓</span>
        <span class="ac-answer-label">Model Answer</span>
      </div>
      <div class="ac-answer-body">${answer}</div>
    </div>
  `;

  // Update nav
  document.getElementById('ac-nav-info').textContent = `${idx + 1} of ${FLAT_SUBS.length} questions`;
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === FLAT_SUBS.length - 1;
}

function navQuestion(dir) {
  selectQuestion(ACTIVE_IDX + dir);
}

// ── Language toggle ───────────────────────────────────
function setLang(lang) {
  LANG = lang;
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-np').classList.toggle('active', lang === 'np');
  applyLang();

  // Re-render active question if one is selected
  if (ACTIVE_IDX >= 0) selectQuestion(ACTIVE_IDX);
}

function applyLang() {
  const showNp = LANG === 'np';

  // Parent question texts
  document.querySelectorAll('[id^="pnp-"]').forEach(el => el.style.display = showNp ? 'block' : 'none');
  document.querySelectorAll('[id^="pen-"]').forEach(el => el.style.display = showNp ? 'none' : 'block');

  // Sub-part texts
  document.querySelectorAll('[id^="snp-"]').forEach(el => el.style.display = showNp ? 'block' : 'none');
  document.querySelectorAll('[id^="sen-"]').forEach(el => el.style.display = showNp ? 'none' : 'block');

  // Instructions
  const instrNp = document.getElementById('instr-np');
  const instrEn = document.getElementById('instr-en');
  if (instrNp) instrNp.style.display = showNp ? 'block' : 'none';
  if (instrEn) instrEn.style.display = showNp ? 'none' : 'block';
}

// ── Init ──────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async function() {
  try {
    await fetchPaper();
    render();
    document.getElementById('loading').style.display = 'none';
  } catch(e) {
    console.error(e);
    document.getElementById('loading').innerHTML = `
      <div style="text-align:center;padding:40px;">
        <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
        <div style="font-size:16px;font-weight:700;color:#0f172a;margin-bottom:8px;">Could not load paper</div>
        <div style="font-size:14px;color:#64748b;margin-bottom:20px;">${e.message}</div>
        <a href="/see.html" style="background:#2563EB;color:white;padding:10px 20px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:700;">← Back to SEE</a>
      </div>
    `;
  }
});
</script>
</body>
</html>
