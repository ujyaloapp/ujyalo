<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEE Past Paper | Ujyalo</title>
  <meta name="description" content="SEE past paper — free bilingual Nepali and English. Step-by-step model answers." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,700;9..144,1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles/main.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand: #2563EB;
      --green: #1D9E75;
      --dark: #0a0f1e;
      --ink: #0f172a;
      --mid: #475569;
      --light: #94a3b8;
      --border: #e2e8f0;
      --bg: #f8fafc;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── TOP BAR ── */
    .topbar {
      background: var(--dark);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      height: 58px;
      flex-shrink: 0;
      z-index: 100;
      position: sticky;
      top: 0;
    }
    .tb-back {
      display: flex; align-items: center; gap: 6px;
      color: rgba(255,255,255,.65); font-size: 13px; font-weight: 600;
      background: rgba(255,255,255,.08); border: none; border-radius: 8px;
      padding: 7px 14px; cursor: pointer; font-family: inherit;
      transition: all .2s; text-decoration: none; flex-shrink: 0;
      white-space: nowrap;
    }
    .tb-back:hover { background: rgba(255,255,255,.15); color: white; }
    .tb-divider { width: 1px; height: 26px; background: rgba(255,255,255,.12); flex-shrink: 0; }
    .tb-info { flex: 1; min-width: 0; }
    .tb-title {
      font-size: 15px; font-weight: 700; color: white;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tb-sub { font-size: 11px; color: rgba(255,255,255,.4); margin-top: 1px; }

    /* Language toggle */
    .tb-lang {
      display: flex; background: rgba(255,255,255,.08);
      border-radius: 8px; padding: 3px; gap: 2px; flex-shrink: 0;
    }
    .tb-lang-btn {
      padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 700;
      border: none; cursor: pointer; font-family: inherit; transition: all .2s;
      color: rgba(255,255,255,.5); background: transparent; white-space: nowrap;
    }
    .tb-lang-btn.active { background: white; color: var(--ink); }

    /* Download dropdown */
    .tb-dl-wrap { position: relative; flex-shrink: 0; }
    .tb-dl {
      display: flex; align-items: center; gap: 7px;
      background: #f59e0b; color: #0a0f1e;
      border: none; border-radius: 8px; padding: 8px 16px;
      font-size: 13px; font-weight: 800; cursor: pointer;
      font-family: inherit; transition: all .2s; white-space: nowrap;
    }
    .tb-dl:hover { background: #d97706; }
    .tb-dl-arrow { font-size: 10px; margin-left: 2px; }
    .dl-dropdown {
      position: absolute; top: calc(100% + 8px); right: 0;
      background: white; border: 1px solid var(--border);
      border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,.15);
      min-width: 200px; overflow: hidden; z-index: 999;
      display: none;
    }
    .dl-dropdown.open { display: block; }
    .dl-option {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 16px; cursor: pointer; transition: background .15s;
      border-bottom: 1px solid #f1f5f9;
      font-size: 14px; font-weight: 600; color: var(--ink);
    }
    .dl-option:last-child { border-bottom: none; }
    .dl-option:hover { background: #f8fafc; }
    .dl-option-icon { font-size: 20px; flex-shrink: 0; }
    .dl-option-sub { font-size: 11px; color: var(--light); margin-top: 1px; font-weight: 400; }

    /* ── MAIN LAYOUT ── */
    .main {
      display: flex;
      flex: 1;
      height: calc(100vh - 58px);
      overflow: hidden;
    }

    /* ── LEFT PANEL ── */
    .q-list {
      width: 600px;
      flex-shrink: 0;
      background: white;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    /* Paper header */
    .paper-header {
      background: white;
      border-bottom: 2px solid var(--ink);
      padding: 24px 24px 18px;
      text-align: center;
      flex-shrink: 0;
    }
    .ph-exam {
      font-family: 'Fraunces', serif;
      font-size: 15px; font-weight: 700; color: var(--ink);
    }
    .ph-subject {
      font-family: 'Fraunces', serif;
      font-size: 20px; font-weight: 700; color: var(--ink);
      margin: 3px 0;
    }
    .ph-subject-np {
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 14px; color: var(--mid); margin-bottom: 10px;
    }
    .ph-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--dark); color: white;
      font-size: 10px; font-weight: 700; padding: 4px 12px;
      border-radius: 999px; margin-bottom: 12px;
    }
    .ph-meta {
      display: flex; justify-content: space-between;
      font-size: 12px; font-weight: 700; color: var(--ink);
      border-top: 1px solid var(--border); padding-top: 12px;
      margin-top: 4px;
    }
    .ph-instructions {
      background: #EFF6FF; border-left: 3px solid var(--brand);
      padding: 10px 14px; margin: 14px 20px 0;
      border-radius: 0 8px 8px 0;
      font-size: 12px; color: var(--mid); line-height: 1.65;
    }
    .ph-instr-np {
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 12px; margin-bottom: 4px; font-style: italic;
    }
    .ph-all { font-weight: 700; color: var(--ink); font-size: 13px; margin-top: 5px; }

    /* Question list */
    .q-items { padding: 8px 0 32px; }

    .q-parent {
      padding: 14px 20px 6px;
      border-top: 1px solid #f1f5f9;
      margin-top: 6px;
    }
    .q-parent:first-child { border-top: none; margin-top: 0; }
    .q-parent-row { display: flex; gap: 8px; align-items: baseline; margin-bottom: 4px; }
    .q-parent-num { font-size: 15px; font-weight: 800; color: var(--ink); flex-shrink: 0; }
    .q-parent-text-en { font-size: 15px; color: var(--mid); line-height: 1.75; }
    .q-parent-text-np {
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 15px; color: var(--ink); line-height: 1.85;
      margin-bottom: 4px; display: none;
    }

    .q-sub-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 10px 20px 10px 36px;
      cursor: pointer; transition: background .15s;
      border-left: 3px solid transparent;
    }
    .q-sub-item:hover { background: #f8fafc; }
    .q-sub-item.active {
      background: #EFF6FF;
      border-left-color: var(--brand);
    }
    .q-sub-letter {
      width: 26px; height: 26px; border-radius: 50%;
      background: #f1f5f9; color: var(--mid);
      font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all .15s;
    }
    .q-sub-item.active .q-sub-letter { background: var(--brand); color: white; }
    .q-sub-content { flex: 1; min-width: 0; }
    .q-sub-text-en { font-size: 15px; color: var(--mid); line-height: 1.7; }
    .q-sub-text-np {
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 15px; color: var(--ink); line-height: 1.8;
      display: none;
    }
    .q-sub-item.active .q-sub-text-en,
    .q-sub-item.active .q-sub-text-np { color: var(--ink); font-weight: 600; }
    .q-sub-marks {
      font-size: 11px; font-weight: 700; color: white;
      background: var(--light); border-radius: 999px;
      padding: 2px 8px; flex-shrink: 0; margin-top: 3px;
      white-space: nowrap;
    }
    .q-sub-item.active .q-sub-marks { background: var(--brand); }

    /* ── RIGHT PANEL ── */
    .answer-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    .answer-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px;
      text-align: center;
    }
    .answer-empty-icon { font-size: 64px; margin-bottom: 16px; opacity: .35; }
    .answer-empty-title {
      font-family: 'Fraunces', serif;
      font-size: 1.6rem; font-weight: 700;
      color: var(--ink); margin-bottom: 8px; opacity: .35;
    }
    .answer-empty-sub { font-size: 15px; color: var(--light); }

    .answer-content {
      flex: 1; overflow-y: auto;
      padding: 20px 24px;
      display: none;
    }
    .answer-content.visible { display: block; }

    .ac-q-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 700; color: var(--brand);
      background: #EFF6FF; padding: 4px 12px; border-radius: 999px;
      text-transform: uppercase; letter-spacing: .06em;
      margin-bottom: 16px;
    }

    .ac-question {
      background: white; border: 1px solid var(--border);
      border-radius: 16px; padding: 22px 24px; margin-bottom: 20px;
    }
    .ac-context-label {
      font-size: 11px; font-weight: 700; color: var(--light);
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px;
    }
    .ac-context-text {
      font-size: 12px; color: var(--mid); line-height: 1.7;
      padding-bottom: 12px; margin-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .ac-context-np {
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 12px; color: var(--ink); line-height: 1.8;
    }
    .ac-q-text {
      font-size: 13px; color: var(--ink); line-height: 1.7; font-weight: 600;
    }
    .ac-q-text-np {
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 13px; color: var(--ink); line-height: 1.8; font-weight: 600;
    }
    .ac-marks {
      display: inline-flex; align-items: center; gap: 5px;
      background: #EFF6FF; color: var(--brand);
      font-size: 12px; font-weight: 700;
      padding: 4px 12px; border-radius: 999px; margin-top: 12px;
    }

    /* Diagram */
    .ac-diagram {
      background: white; border: 1px solid var(--border);
      border-radius: 12px; padding: 16px;
      margin: 14px 0; display: flex;
      flex-direction: column; align-items: center;
    }
    .ac-diagram-label {
      font-size: 10px; font-weight: 700; color: var(--light);
      text-transform: uppercase; letter-spacing: .08em; margin-top: 8px;
    }

    /* Answer box */
    .ac-answer {
      background: white;
      border: 1.5px solid #bbf7d0;
      border-radius: 16px; overflow: hidden;
    }
    .ac-answer-header {
      background: var(--green); padding: 12px 20px;
      display: flex; align-items: center; gap: 8px;
    }
    .ac-answer-label {
      font-size: 12px; font-weight: 700; color: white;
      text-transform: uppercase; letter-spacing: .08em;
    }
    .ac-answer-body {
      padding: 16px 20px;
      font-size: 13px; color: #065f46;
      line-height: 1.8; white-space: pre-wrap;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    /* Nav */
    .ac-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 24px; border-top: 1px solid var(--border);
      background: white; flex-shrink: 0;
    }
    .ac-nav-info { font-size: 13px; color: var(--light); font-weight: 600; }
    .ac-nav-btns { display: flex; gap: 8px; }
    .ac-nav-btn {
      padding: 9px 18px; border-radius: 8px; font-size: 13px; font-weight: 700;
      border: none; cursor: pointer; font-family: inherit; transition: all .2s;
    }
    .ac-nav-prev { background: #f1f5f9; color: var(--mid); }
    .ac-nav-prev:hover:not(:disabled) { background: var(--border); }
    .ac-nav-next { background: var(--brand); color: white; }
    .ac-nav-next:hover:not(:disabled) { background: #1d4ed8; }
    .ac-nav-btn:disabled { opacity: .35; cursor: not-allowed; }

    /* Loading */
    .loading-screen {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 999;
    }
    .spinner {
      width: 40px; height: 40px; border: 3px solid var(--border);
      border-top-color: var(--brand); border-radius: 50%;
      animation: spin .8s linear infinite; margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--light); font-weight: 600; }

    /* Mobile */
    @media (max-width: 768px) {
      .main { flex-direction: column; height: auto; overflow: auto; }
      .q-list { width: 100%; border-right: none; border-bottom: 1px solid var(--border); overflow: visible; height: auto; }
      .answer-panel { min-height: 70vh; overflow: auto; }
      .answer-content { display: block; min-height: 400px; }
      .answer-empty { display: none; }
      .tb-dl span { display: none; }
      .ac-nav { position: sticky; bottom: 0; z-index: 10; }
    }

    @media print {
      .topbar, .ac-nav, #site-nav, #site-footer { display: none !important; }
      body { height: auto; }
      .main { flex-direction: column; height: auto; overflow: visible; }
      .q-list { width: 100%; overflow: visible; border: none; }
      .answer-panel { display: none; }
    }
  </style>
</head>
<body>

<div id="site-nav"></div>

<!-- Loading -->
<div class="loading-screen" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Loading paper...</div>
</div>

<!-- Top bar -->
<div class="topbar">
  <a href="/see.html?mode=past-papers" class="tb-back">← Back</a>
  <div class="tb-divider"></div>
  <div class="tb-info">
    <div class="tb-title" id="tb-title">Loading...</div>
    <div class="tb-sub" id="tb-sub"></div>
  </div>
  <div class="tb-lang">
    <button class="tb-lang-btn active" id="btn-en" onclick="setLang('en')">🇬🇧 English</button>
    <button class="tb-lang-btn" id="btn-np" onclick="setLang('np')">🇳🇵 नेपाली</button>
  </div>
  <div class="tb-dl-wrap">
    <button class="tb-dl" onclick="toggleDlDropdown()">
      ⬇ <span>Download PDF</span> <span class="tb-dl-arrow">▾</span>
    </button>
    <div class="dl-dropdown" id="dl-dropdown">
      <div class="dl-option" onclick="downloadPDF('en')">
        <div class="dl-option-icon">🇬🇧</div>
        <div>
          <div>English PDF</div>
          <div class="dl-option-sub">Questions in English only</div>
        </div>
      </div>
      <div class="dl-option" onclick="downloadPDF('np')">
        <div class="dl-option-icon">🇳🇵</div>
        <div>
          <div>Nepali PDF</div>
          <div class="dl-option-sub">नेपाली भाषामा मात्र</div>
        </div>
      </div>
      <div class="dl-option" onclick="downloadPDF('both')">
        <div class="dl-option-icon">📄</div>
        <div>
          <div>Both languages</div>
          <div class="dl-option-sub">Nepali + English combined</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Main -->
<div class="main">

  <!-- Left: question list -->
  <div class="q-list" id="q-list">
    <div class="paper-header" id="paper-header"></div>
    <div class="q-items" id="q-items"></div>
  </div>

  <!-- Right: answer panel -->
  <div class="answer-panel">
    <div class="answer-empty" id="answer-empty">
      <div class="answer-empty-icon">👈</div>
      <div class="answer-empty-title">Select a question</div>
      <div class="answer-empty-sub">Click any question on the left to see the model answer</div>
    </div>
    <div class="answer-content" id="answer-content"></div>
    <div class="ac-nav" id="ac-nav" style="display:none;">
      <div class="ac-nav-info" id="ac-nav-info"></div>
      <div class="ac-nav-btns">
        <button class="ac-nav-btn ac-nav-prev" id="btn-prev" onclick="navQuestion(-1)">← Prev</button>
        <button class="ac-nav-btn ac-nav-next" id="btn-next" onclick="navQuestion(1)">Next →</button>
      </div>
    </div>
  </div>

</div>

<div id="site-footer"></div>
<script src="/scripts/components.js"></script>

let LANG = 'en';
let PAPER = null;
let QUESTIONS = [];
let FLAT_SUBS = [];
let ACTIVE_IDX = -1;
let SB_URL = '';

// SVG diagrams for questions that need them
const DIAGRAMS = {

  // Q12 — Circle theorems
  '12': `<svg width="155" height="155" viewBox="0 0 155 155" xmlns="http://www.w3.org/2000/svg">

// ── Get URL params ────────────────────────────────────
function getPaperParams() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('paper_id')) return { by: 'id', value: params.get('paper_id') };
  const path = window.location.pathname;
  const match = path.match(/\/see\/past-papers\/(\d+)\/([^\/]+)\/([^\/]+)/);
  if (match) return { by: 'slug', year: match[1], province: match[2], subject: match[3] };
  return { by: 'id', value: '7ba8eb9e-00ff-4f94-8500-261c51ca4fec' };
}

// ── Fetch config then paper ───────────────────────────
async function init() {
  const cfg = await fetch('/api/auth?action=config').then(r => r.json());
  SB_URL = cfg.url;
  SB_KEY = cfg.anon_key;
  await fetchPaper();
  render();
  document.getElementById('loading').style.display = 'none';
}

async function fetchPaper() {
  const p = getPaperParams();
  let paperId = p.value;

  if (p.by === 'slug') {
    const subjRes = await sb(`/rest/v1/exam_subjects?code=eq.${p.subject}&select=id,name,name_nepali`);
    if (!subjRes[0]) throw new Error('Subject not found');
    const paperRes = await sb(`/rest/v1/past_papers?subject_id=eq.${subjRes[0].id}&year=eq.${p.year}&province=eq.${p.province}&select=*`);
    if (!paperRes[0]) throw new Error('Paper not found');
    PAPER = paperRes[0];
    PAPER.subject_name = subjRes[0].name;
    PAPER.subject_name_np = subjRes[0].name_nepali;
    paperId = PAPER.id;
  } else {
    const paperRes = await sb(`/rest/v1/past_papers?id=eq.${paperId}&select=*`);
    if (!paperRes[0]) throw new Error('Paper not found');
    PAPER = paperRes[0];
    const subjRes = await sb(`/rest/v1/exam_subjects?id=eq.${PAPER.subject_id}&select=name,name_nepali`);
    PAPER.subject_name = subjRes[0]?.name || 'Mathematics';
    PAPER.subject_name_np = subjRes[0]?.name_nepali || 'गणित';
  }

  QUESTIONS = await sb(`/rest/v1/past_paper_questions?paper_id=eq.${paperId}&order=question_number.asc,sub_part.asc&select=*`);
}

function sb(path) {
  return fetch(`${SB_URL}${path}`, {
    headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
  }).then(r => r.json());
}

// ── Render ────────────────────────────────────────────
function render() {
  const yearAD = PAPER.year > 2000 ? parseInt(PAPER.year) - 56 : PAPER.year;
  document.getElementById('tb-title').textContent = `${PAPER.subject_name} · SEE ${PAPER.year}`;
  document.getElementById('tb-sub').textContent = `${PAPER.province} Province · Full marks: ${PAPER.total_marks}`;
  document.title = `SEE ${PAPER.year} ${PAPER.province} ${PAPER.subject_name} | Ujyalo`;

  // Paper header
  document.getElementById('paper-header').innerHTML = `
    <div class="ph-exam">SEE ${PAPER.year} (${yearAD} AD)</div>
    <div class="ph-subject">Compulsory ${PAPER.subject_name}</div>
    <div class="ph-subject-np">अनिवार्य ${PAPER.subject_name_np || ''}</div>
    <div><span class="ph-badge">🏔 ${PAPER.province} Province</span></div>
    <div class="ph-meta">
      <span>Time: ${PAPER.time_minutes / 60} Hours</span>
      <span>Full Marks: ${PAPER.total_marks}</span>
    </div>
    ${PAPER.instructions_english ? `
    <div class="ph-instructions">
      <div class="ph-instr-np lang-np" style="display:none">${PAPER.instructions_nepali || ''}</div>
      <div class="lang-en" style="font-style:italic;font-size:11px;color:var(--mid);">${PAPER.instructions_english}</div>
      <div class="ph-all">All questions are compulsory.</div>
    </div>` : ''}
  `;

  // Build question groups
  const groups = {};
  QUESTIONS.forEach(q => {
    const num = q.question_number;
    if (!groups[num]) groups[num] = { parent: null, subs: [] };
    if (!q.sub_part) groups[num].parent = q;
    else groups[num].subs.push(q);
  });

  FLAT_SUBS = [];
  Object.values(groups).forEach(g => g.subs.forEach(s => FLAT_SUBS.push(s)));

  let html = '';
  Object.entries(groups)
    .sort((a, b) => parseInt(a[0]) - parseInt(b[0]))
    .forEach(([num, g]) => {
      const p = g.parent;
      html += `
      <div class="q-parent">
        <div class="q-parent-row">
          <div class="q-parent-num">${num}.</div>
        </div>
        ${p?.question_text_nepali ? `<div class="q-parent-text-np lang-np" style="display:none">${p.question_text_nepali}</div>` : ''}
        ${p?.question_text_english ? `<div class="q-parent-text-en lang-en">${p.question_text_english}</div>` : ''}
        ${DIAGRAMS[num] ? `<div style="margin:10px 0 4px 0;">${DIAGRAMS[num]}</div>` : ''}
      </div>`;

      g.subs.forEach(sub => {
        const idx = FLAT_SUBS.indexOf(sub);
        html += `
        <div class="q-sub-item" id="sub-${sub.id}" onclick="selectQuestion(${idx})">
          <div class="q-sub-letter">${sub.sub_part}</div>
          <div class="q-sub-content">
            ${sub.question_text_nepali ? `<div class="q-sub-text-np lang-np" style="display:none">${sub.question_text_nepali}</div>` : ''}
            ${sub.question_text_english ? `<div class="q-sub-text-en lang-en">${sub.question_text_english}</div>` : ''}
          </div>
          <div class="q-sub-marks">${sub.marks}m</div>
        </div>`;
      });
    });

  document.getElementById('q-items').innerHTML = html;
  applyLang();
}

// ── Select question ───────────────────────────────────
function selectQuestion(idx) {
  if (idx < 0 || idx >= FLAT_SUBS.length) return;
  ACTIVE_IDX = idx;
  const q = FLAT_SUBS[idx];

  document.querySelectorAll('.q-sub-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`sub-${q.id}`);
  if (el) { el.classList.add('active'); el.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); }

  document.getElementById('answer-empty').style.display = 'none';
  document.getElementById('ac-nav').style.display = 'flex';
  const content = document.getElementById('answer-content');
  content.classList.add('visible');

  const parent = QUESTIONS.find(pq => pq.question_number === q.question_number && !pq.sub_part);
  const showNp = LANG === 'np';

  const ctxText = showNp ? (parent?.question_text_nepali || parent?.question_text_english || '') : (parent?.question_text_english || '');
  const qText = showNp ? (q.question_text_nepali || q.question_text_english || '') : (q.question_text_english || q.question_text_nepali || '');
  const answer = q.answer_text || 'Model answer coming soon.';
  const diagram = DIAGRAMS[String(q.question_number)];

  const isNp = LANG === 'np';

  content.innerHTML = `
    <div class="ac-q-badge">Question ${q.question_number}(${q.sub_part}) · ${q.marks} mark${q.marks !== 1 ? 's' : ''}</div>

    <div class="ac-question">
      ${ctxText ? `
        <div class="ac-context-label">Context</div>
        <div class="${isNp ? 'ac-context-np' : 'ac-context-text'}">${ctxText}</div>
      ` : ''}
      ${diagram ? `<div class="ac-diagram">${diagram}<div class="ac-diagram-label">Figure / चित्र</div></div>` : ''}
      <div class="${isNp ? 'ac-q-text-np' : 'ac-q-text'}">${qText}</div>
      <div class="ac-marks">📋 ${q.marks} mark${q.marks !== 1 ? 's' : ''}</div>
    </div>

    <div class="ac-answer">
      <div class="ac-answer-header">
        <span style="font-size:16px;">✓</span>
        <span class="ac-answer-label">Model Answer</span>
      </div>
      <div class="ac-answer-body">${answer}</div>
    </div>
  `;

  document.getElementById('ac-nav-info').textContent = `${idx + 1} of ${FLAT_SUBS.length} questions`;
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === FLAT_SUBS.length - 1;

  content.scrollTop = 0;

  // Mobile: scroll to answer panel
  if (window.innerWidth <= 768) {
    const answerPanel = document.querySelector('.answer-panel');
    if (answerPanel) {
      setTimeout(() => {
        answerPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 100);
    }
  }
}

function navQuestion(dir) { selectQuestion(ACTIVE_IDX + dir); }

// ── Language ──────────────────────────────────────────
function setLang(lang) {
  LANG = lang;
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-np').classList.toggle('active', lang === 'np');
  applyLang();
  if (ACTIVE_IDX >= 0) selectQuestion(ACTIVE_IDX);
}

function applyLang() {
  const showNp = LANG === 'np';
  document.querySelectorAll('.lang-np').forEach(el => el.style.display = showNp ? 'block' : 'none');
  document.querySelectorAll('.lang-en').forEach(el => el.style.display = showNp ? 'none' : 'block');
}

// ── PDF Download ──────────────────────────────────────
function toggleDlDropdown() {
  document.getElementById('dl-dropdown').classList.toggle('open');
}
document.addEventListener('click', e => {
  if (!e.target.closest('.tb-dl-wrap')) {
    document.getElementById('dl-dropdown').classList.remove('open');
  }
});

function downloadPDF(lang) {
  document.getElementById('dl-dropdown').classList.remove('open');
  const prev = LANG;
  if (lang === 'en') setLang('en');
  else if (lang === 'np') setLang('np');
  else setLang('en'); // both — default to English for print
  setTimeout(() => {
    window.print();
    setTimeout(() => setLang(prev), 500);
  }, 300);
}

// ── Init ──────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  try {
    await init();
  } catch(e) {
    console.error(e);
    document.getElementById('loading').innerHTML = `
      <div style="text-align:center;padding:40px;">
        <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
        <div style="font-size:16px;font-weight:700;color:#0f172a;margin-bottom:8px;">Could not load paper</div>
        <div style="font-size:14px;color:#64748b;margin-bottom:20px;">${e.message}</div>
        <a href="/see.html" style="background:#2563EB;color:white;padding:10px 20px;border-radius:8px;text-decoration:none;font-weight:700;">← Back</a>
      </div>`;
  }
});
