<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — Ujyalo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles/main.css">
</head>
<body style="background: var(--ink-50); min-height: 100vh;">

<nav class="nav-public" style="background: white;">
  <div class="container nav-inner">
    <a href="/" class="logo">
      <svg width="22" height="22" viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="6" fill="#F59E0B"/>
        <g stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round">
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="16" y1="26" x2="16" y2="30"/>
          <line x1="2" y1="16" x2="6" y2="16"/><line x1="26" y1="16" x2="30" y2="16"/>
          <line x1="6" y1="6" x2="9" y2="9"/><line x1="23" y1="23" x2="26" y2="26"/>
          <line x1="26" y1="6" x2="23" y2="9"/><line x1="9" y1="23" x2="6" y2="26"/>
        </g>
      </svg>
      ujyalo
    </a>
    <div class="nav-actions">
      <span class="text-muted" style="font-size: 13px;">New here?</span>
      <a href="/signup.html" class="btn-ghost">Sign up free</a>
    </div>
  </div>
</nav>

<div style="padding: 80px 0 40px;">
  <div class="container-tiny animate-up">
    <div class="text-center mb-8">
      <h1 class="font-display" style="font-size: 32px; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 8px;">
        Welcome back
      </h1>
      <p class="text-muted" style="font-size: 15px;">Log in to continue practising.</p>
    </div>

    <div class="card" style="padding: 32px;">
      <div class="field">
        <label>Email</label>
        <input type="email" class="input" placeholder="you@example.com" autocomplete="email">
      </div>

      <div class="field">
        <div class="flex justify-between items-center mb-2">
          <label style="margin-bottom: 0;">Password</label>
          <a href="#" style="font-size: 12px; color: var(--brand);">Forgot password?</a>
        </div>
        <input type="password" class="input" placeholder="Your password" autocomplete="current-password">
      </div>

      <button class="btn btn-blue btn-block mt-4">Log in →</button>
    </div>

    <p class="text-center mt-6 text-muted" style="font-size: 14px;">
      Don't have an account yet? <a href="/signup.html" style="color: var(--brand); font-weight: 600;">Sign up free</a>
    </p>
  </div>
</div>

</body>
</html>
