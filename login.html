<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — Ujyalo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="/styles/main.css">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,400;1,9..144,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ===== Editorial Scholar — Login (auth form + scripts unchanged) ===== */
  :root{--forest:#11302a;--forest2:#1c4a40;--moss:#3f7d6e;--brass:#c0913f;--brass-soft:#e7c986;--paper:#f4f0e6;--card:#fbf9f3;--ink:#1a2420;--muted:#5f6b64;--faint:#9aa49d;--line:#e0d9c8;}
  .es *{margin:0;padding:0;box-sizing:border-box;}
  .es{font-family:'Outfit',sans-serif;color:var(--ink);}
  .es em{font-style:italic;} .es a{text-decoration:none;}
  .auth-bg{position:relative;overflow:hidden;padding:70px 20px 90px;min-height:70vh;display:flex;align-items:flex-start;justify-content:center;
    background:radial-gradient(at 25% 0%,rgba(192,145,63,.12) 0,transparent 50%),radial-gradient(at 80% 20%,rgba(63,125,110,.10) 0,transparent 55%),var(--paper);}
  .auth-bg::before{content:'उ';position:absolute;right:-2%;bottom:-60px;font-family:'Fraunces';font-weight:900;font-size:300px;color:rgba(17,48,42,.04);line-height:1;pointer-events:none;}
  .auth-card{position:relative;width:100%;max-width:430px;background:var(--card);border:1px solid var(--line);border-radius:22px;padding:38px 34px;box-shadow:0 24px 60px -28px rgba(17,48,42,.3);overflow:hidden;}
  .auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--forest),var(--brass));}
  .auth-h{font-family:'Fraunces';font-weight:600;font-size:24px;color:var(--forest);margin-bottom:6px;}
  .auth-sub{font-size:14px;color:var(--muted);margin-bottom:24px;}
  .auth-err{background:#fee2e2;border:1px solid #fecaca;border-radius:10px;padding:11px 14px;margin-bottom:16px;font-size:14px;color:#b91c1c;}
  .auth-field{margin-bottom:16px;}
  .auth-label{display:block;font-size:13px;font-weight:700;color:var(--ink);margin-bottom:6px;}
  .required{color:#b91c1c;margin-left:2px;}
  .auth-input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:11px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--ink);background:#fff;outline:none;transition:border-color .2s;}
  .auth-input:focus{border-color:var(--moss);}
  .auth-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .auth-link{font-size:12px;color:var(--moss);font-weight:600;}
  .auth-btn{display:block;width:100%;text-align:center;background:var(--forest);color:#fff;border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;padding:14px;border-radius:11px;margin-top:6px;transition:opacity .15s;}
  .auth-btn:hover{opacity:.9;}
  .auth-foot{text-align:center;font-size:13px;color:var(--muted);margin-top:22px;}
  .auth-foot a{color:var(--moss);font-weight:600;}
  .hidden{display:none !important;}
</style>
</head>
<body>
<div id="site-nav"></div>

<div class="es"><div class="auth-bg">
  <div class="auth-card">
    <h1 class="auth-h">Welcome back 👋</h1>
    <p class="auth-sub">Log in to continue your practice.</p>
    <div id="error-msg" class="auth-err hidden"></div>
    <div class="auth-field">
      <label class="auth-label">Email <span class="required">*</span></label>
      <input type="email" class="auth-input" id="input-email" placeholder="rajan@example.com">
    </div>
    <div class="auth-field">
      <div class="auth-row">
        <label class="auth-label" style="margin-bottom:0;">Password <span class="required">*</span></label>
        <a href="/forgot-password.html" class="auth-link">Forgot password?</a>
      </div>
      <input type="password" class="auth-input" id="input-password" placeholder="Your password">
    </div>
    <button class="auth-btn" id="submit-btn" onclick="submitLogin()">Log in →</button>
    <p class="auth-foot">Don't have an account? <a href="/signup.html">Sign up free →</a></p>
  </div>
</div></div>

<div id="site-footer"></div>
<script src="/scripts/components.js"></script>
<script>
  // If already logged in — redirect based on role
  const user  = JSON.parse(localStorage.getItem('ujyalo_user') || 'null');
  const token = localStorage.getItem('ujyalo_token');
  if (user && token) {
    const role = user.role || 'student';
    let dest = '/dashboard.html';
    if (role === 'admin')   dest = '/admin.html';
    if (role === 'teacher') dest = '/teacher.html';
    if (role === 'parent')  dest = '/parent.html';
    window.location.href = dest;
  }
</script>
<script>
async function submitLogin() {
  const email    = document.getElementById('input-email').value.trim();
  const password = document.getElementById('input-password').value;
  const btn      = document.getElementById('submit-btn');
  hideError();
  if (!email)    { showError('Please enter your email address.'); return; }
  if (!password) { showError('Please enter your password.'); return; }
  btn.disabled = true;
  btn.textContent = 'Logging in...';
  try {
    const res = await fetch('/api/auth?action=login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (data.success) {
      localStorage.setItem('ujyalo_token', data.access_token);
      localStorage.setItem('ujyalo_user', JSON.stringify(data.user));
      window.location.href = data.redirectTo || '/dashboard.html';
    } else {
      showError(data.error || 'Something went wrong. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Log in →';
    }
  } catch (e) {
    showError('Something went wrong. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Log in →';
  }
}
function showError(msg) { const e = document.getElementById('error-msg'); e.textContent = msg; e.classList.remove('hidden'); }
function hideError() { document.getElementById('error-msg').classList.add('hidden'); }
</script>
</body>
</html>
