<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — Ujyalo</title>
<link rel="canonical" href="https://ujyalo.app/login.html">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="/styles/main.css">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,400;1,9..144,600;1,9..144,700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ===== Editorial Scholar — Login (auth form + scripts unchanged) ===== */
  :root{--forest:#1f2933;--forest2:#0b5c55;--moss:#0b5c55;--brass:#0f766e;--brass-soft:#99f6e4;--paper:#f7faf8;--card:#ffffff;--ink:#1f2933;--muted:#52606d;--faint:#8b93a0;--line:#e6eae8;}
  .es *{margin:0;padding:0;box-sizing:border-box;}
  .es{font-family:'Outfit',sans-serif;color:var(--ink);}
  .es em{font-style:italic;} .es a{text-decoration:none;}
  .auth-bg{position:relative;overflow:hidden;padding:70px 20px 90px;min-height:70vh;display:flex;align-items:flex-start;justify-content:center;
    background:radial-gradient(at 25% 0%,rgba(15,118,110,.12) 0,transparent 50%),radial-gradient(at 80% 20%,rgba(15,118,110,.10) 0,transparent 55%),var(--paper);}
  .auth-bg::before{content:'उ';position:absolute;right:-2%;bottom:-60px;font-family:'Fraunces';font-weight:900;font-size:300px;color:rgba(31,41,51,.04);line-height:1;pointer-events:none;}
  .auth-card{position:relative;width:100%;max-width:430px;background:var(--card);border:1px solid var(--line);border-radius:22px;padding:38px 34px;box-shadow:0 24px 60px -28px rgba(31,41,51,.3);overflow:hidden;}
  .auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--forest),var(--brass));}
  .auth-h{font-family:'Fraunces';font-weight:600;font-size:24px;color:var(--forest);margin-bottom:6px;}
  .auth-sub{font-size:14px;color:var(--muted);margin-bottom:24px;}
  .auth-err{background:#ffe4e6;border:1px solid #fecdd3;border-radius:10px;padding:11px 14px;margin-bottom:16px;font-size:14px;color:#e11d48;}
  .auth-resend{background:#f0faf8;border:1px solid #cdeee7;border-radius:10px;padding:11px 14px;margin-bottom:16px;font-size:13.5px;color:#52606d;line-height:1.55;}
  .auth-resend b{color:#1f2933;}
  .auth-linkbtn{background:none;border:none;color:#0f766e;font-weight:700;cursor:pointer;text-decoration:underline;font-size:13.5px;padding:0;font-family:inherit;}
  .auth-resend-msg{margin-top:7px;font-weight:600;color:#0b5c55;}
  .auth-field{margin-bottom:16px;}
  .auth-label{display:block;font-size:13px;font-weight:700;color:var(--ink);margin-bottom:6px;}
  .required{color:#e11d48;margin-left:2px;}
  .auth-input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:11px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--ink);background:#fff;outline:none;transition:border-color .2s;}
  .auth-input:focus{border-color:var(--moss);}
  .auth-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .auth-link{font-size:12px;color:var(--moss);font-weight:600;}
  .auth-btn{display:block;width:100%;text-align:center;background:#0f766e;color:#fff;border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;padding:14px;border-radius:11px;margin-top:6px;transition:opacity .15s;}
  .auth-btn:hover{opacity:.9;}
  .auth-foot{text-align:center;font-size:13px;color:var(--muted);margin-top:22px;}
  .auth-foot a{color:var(--moss);font-weight:600;}
  .hidden{display:none !important;}
</style>
</head>
<body>
<div id="site-nav"></div>

<div class="es"><div class="auth-bg">
  <div class="auth-card">
    <h1 class="auth-h">Welcome back 👋</h1>
    <p class="auth-sub">Log in to continue your practice.</p>
    <div id="error-msg" class="auth-err hidden"></div>
    <div id="resend-box" class="auth-resend hidden">
      Didn't get the confirmation email? Check your <b>spam / junk</b> folder — or
      <button type="button" id="resend-btn" class="auth-linkbtn" onclick="resendConfirm()">resend the link</button>.
      <div id="resend-msg" class="auth-resend-msg hidden"></div>
    </div>
    <div class="auth-field">
      <label class="auth-label">Email <span class="required">*</span></label>
      <input type="email" class="auth-input" id="input-email" placeholder="rajan@example.com">
    </div>
    <div class="auth-field">
      <div class="auth-row">
        <label class="auth-label" style="margin-bottom:0;">Password <span class="required">*</span></label>
        <a href="/forgot-password.html" class="auth-link">Forgot password?</a>
      </div>
      <input type="password" class="auth-input" id="input-password" placeholder="Your password">
    </div>
    <button class="auth-btn" id="submit-btn" onclick="submitLogin()">Log in →</button>
    <p class="auth-foot">Don't have an account? <a href="/signup.html">Sign up free →</a></p>
  </div>
</div></div>

<div id="site-footer"></div>
<script src="/scripts/ujyalo-auth.js"></script>
<script src="/scripts/components.js"></script>
<script>
  // Where to send the user after login. Honour a ?next= path (e.g. the paper
  // they were reading behind the signup gate) — but only same-origin absolute
  // paths, so it can't be abused as an open redirect.
  function nextDest() {
    try {
      var m = /[?&]next=([^&]+)/.exec(location.search);
      if (!m) return null;
      var n = decodeURIComponent(m[1]);
      if (/^\/(?!\/)/.test(n)) return n;
    } catch (e) {}
    return null;
  }

  // If already logged in — go to ?next= if present, else land by role.
  const user  = ujyaloGetUser();
  const token = ujyaloGetToken();
  if (user && token) {
    const role = user.role || 'student';
    let dest = nextDest();
    if (!dest) {
      dest = '/dashboard.html';
      if (role === 'admin')   dest = '/admin.html';
      if (role === 'editor')  dest = '/verify.html';
    }
    window.location.href = dest;
  }
  // Arrived here because a saved session expired — explain why.
  if (/[?&]expired=1/.test(location.search)) {
    var sub = document.querySelector('.auth-sub');
    if (sub) { sub.textContent = 'Your session expired for security — please log in again.'; sub.style.color = '#f59e0b'; }
  }
</script>
<script>
async function submitLogin() {
  const email    = document.getElementById('input-email').value.trim();
  const password = document.getElementById('input-password').value;
  const btn      = document.getElementById('submit-btn');
  hideError();
  if (!email)    { showError('Please enter your email address.'); return; }
  if (!password) { showError('Please enter your password.'); return; }
  btn.disabled = true;
  btn.textContent = 'Logging in...';
  try {
    const res = await fetch('/api/auth?action=login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (data.success) {
      localStorage.setItem('ujyalo_token', data.access_token);
      localStorage.setItem('ujyalo_user', JSON.stringify(data.user));
      window.location.href = nextDest() || data.redirectTo || '/dashboard.html';
    } else {
      showError(data.error || 'Something went wrong. Please try again.');
      if (data.needsVerification) {
        window._pendingEmail = data.email || email;
        document.getElementById('resend-box').classList.remove('hidden');
      }
      btn.disabled = false;
      btn.textContent = 'Log in →';
    }
  } catch (e) {
    showError('Something went wrong. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Log in →';
  }
}
async function resendConfirm() {
  const email = window._pendingEmail || document.getElementById('input-email').value.trim();
  if (!email) return;
  const btn = document.getElementById('resend-btn');
  const msg = document.getElementById('resend-msg');
  btn.disabled = true; btn.textContent = 'sending…';
  try {
    const res = await fetch('/api/auth?action=resend-confirmation', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const data = await res.json();
    msg.textContent = data.message || (data.success ? 'Sent! Check your inbox and spam folder.' : (data.error || 'Could not resend.'));
    msg.classList.remove('hidden');
  } catch (e) {
    msg.textContent = 'Could not resend right now. Please try again.';
    msg.classList.remove('hidden');
  }
  btn.disabled = false; btn.textContent = 'resend the link';
}
function showError(msg) { const e = document.getElementById('error-msg'); e.textContent = msg; e.classList.remove('hidden'); }
function hideError() { document.getElementById('error-msg').classList.add('hidden'); var rb = document.getElementById('resend-box'); if (rb) rb.classList.add('hidden'); }
</script>
</body>
</html>
