<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — Ujyalo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles/main.css">
<style>
  .required { color: #B91C1C; margin-left: 2px; }
</style>
</head>
<body>
<div id="site-nav"></div>

<div style="padding:60px 0 80px;background:var(--ink-50);">
  <div class="container-tiny animate-up">

    <div class="card" style="padding:32px;">
      <h3 class="font-display" style="font-size:22px;font-weight:600;margin-bottom:6px;">Welcome back 👋</h3>
      <p class="text-muted mb-6" style="font-size:14px;">Log in to continue your practice.</p>

      <!-- Error message -->
      <div id="error-msg" class="hidden" style="background:#FEE2E2;border:1px solid #FECACA;border-radius:var(--radius-md);padding:12px 16px;margin-bottom:16px;font-size:14px;color:#B91C1C;"></div>

      <div class="field">
        <label>Email <span class="required">*</span></label>
        <input type="email" class="input" id="input-email" placeholder="rajan@example.com">
      </div>
      <div class="field">
        <label>Password <span class="required">*</span></label>
        <input type="password" class="input" id="input-password" placeholder="Your password">
      </div>

      <button class="btn btn-blue btn-block" id="submit-btn" onclick="submitLogin()">
        Log in →
      </button>

      <p class="text-muted text-center mt-6" style="font-size:13px;">
        Don't have an account? <a href="/signup.html" style="color:var(--brand);font-weight:600;">Sign up free →</a>
      </p>
    </div>

  </div>
</div>

<div id="site-footer"></div>
<script src="/scripts/components.js"></script>
  <script>
  // If already logged in — go straight to dashboard
  const user = localStorage.getItem('ujyalo_user');
  const token = localStorage.getItem('ujyalo_token');
  if (user && token) {
    window.location.href = '/dashboard.html';
  }
</script>
<script>
async function submitLogin() {
  const email    = document.getElementById('input-email').value.trim();
  const password = document.getElementById('input-password').value;
  const btn      = document.getElementById('submit-btn');
  hideError();

  if (!email)    { showError('Please enter your email address.'); return; }
  if (!password) { showError('Please enter your password.'); return; }

  btn.disabled = true;
  btn.textContent = 'Logging in...';

  try {
    const res = await fetch('/api/auth-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.success) {
      // Save session to localStorage
      localStorage.setItem('ujyalo_token', data.access_token);
      localStorage.setItem('ujyalo_user', JSON.stringify(data.user));

      // Redirect to dashboard
      window.location.href = '/dashboard.html';
    } else {
      showError(data.error || 'Something went wrong. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Log in →';
    }
  } catch (e) {
    showError('Something went wrong. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Log in →';
  }
}

function showError(msg) { const e = document.getElementById('error-msg'); e.textContent = msg; e.classList.remove('hidden'); }
function hideError() { document.getElementById('error-msg').classList.add('hidden'); }
</script>
</body>
</html>
