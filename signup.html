<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign up — Ujyalo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles/main.css">
</head>
<body style="background: var(--ink-50); min-height: 100vh;">

<nav class="nav-public" style="background: white;">
  <div class="container nav-inner">
    <a href="/" class="logo">
      <svg width="22" height="22" viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="6" fill="#F59E0B"/>
        <g stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round">
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="16" y1="26" x2="16" y2="30"/>
          <line x1="2" y1="16" x2="6" y2="16"/><line x1="26" y1="16" x2="30" y2="16"/>
          <line x1="6" y1="6" x2="9" y2="9"/><line x1="23" y1="23" x2="26" y2="26"/>
          <line x1="26" y1="6" x2="23" y2="9"/><line x1="9" y1="23" x2="6" y2="26"/>
        </g>
      </svg>
      ujyalo
    </a>
    <div class="nav-actions">
      <span class="text-muted" style="font-size: 13px;">Already have an account?</span>
      <a href="/login.html" class="btn-ghost">Log in</a>
    </div>
  </div>
</nav>

<div style="padding: 60px 0 40px;">
  <div class="container-tiny animate-up">
    <div class="text-center mb-8">
      <h1 class="font-display" style="font-size: 32px; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 8px;">
        Create your free account
      </h1>
      <p class="text-muted" style="font-size: 15px;">Takes 30 seconds. No credit card needed.</p>
    </div>

    <div class="card" style="padding: 32px;">
      <div class="field">
        <label>Your full name</label>
        <input type="text" class="input" placeholder="Rajan Sharma">
      </div>
      <div class="field">
        <label>School</label>
        <input type="text" class="input" placeholder="Trinity Secondary School">
      </div>
      <div class="grid-2" style="gap: 12px;">
        <div class="field">
          <label>Grade</label>
          <select class="select">
            <option>Grade 10 (SEE)</option>
            <option>Grade 11</option>
            <option>Grade 12</option>
          </select>
        </div>
        <div class="field">
          <label>City</label>
          <select class="select">
            <option>Kathmandu</option>
            <option>Pokhara</option>
            <option>Lalitpur</option>
            <option>Bhaktapur</option>
            <option>Chitwan</option>
            <option>Butwal</option>
            <option>Other</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" class="input" placeholder="rajan@example.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" class="input" placeholder="At least 6 characters">
      </div>

      <div style="background: var(--sun-50); border: 1px solid var(--sun-light); border-radius: var(--radius-md); padding: 16px; margin-bottom: 20px;">
        <label style="display: flex; gap: 10px; align-items: start; cursor: pointer; margin-bottom: 8px;">
          <input type="checkbox" checked style="margin-top: 4px; width: 16px; height: 16px; accent-color: var(--brand);">
          <span>
            <strong style="font-size: 14px; display: block; margin-bottom: 2px;">📧 Send weekly progress reports to my parent</strong>
            <span style="font-size: 13px; color: #854F0B;">Optional but recommended.</span>
          </span>
        </label>
        <input type="email" class="input" placeholder="parent@example.com" style="margin-top: 8px; background: white;">
      </div>

      <a href="/dashboard.html" class="btn btn-blue btn-block">Create my account →</a>

      <p class="text-muted text-center mt-6" style="font-size: 12px;">
        By signing up, you agree to our <a href="/terms.html" style="color: var(--brand);">terms</a>. We'll never share your data.
      </p>
    </div>

    <p class="text-center mt-6 text-muted" style="font-size: 14px;">
      Already have an account? <a href="/login.html" style="color: var(--brand); font-weight: 600;">Log in</a>
    </p>
  </div>
</div>

<a href="/contact.html" class="help-bubble">
  <span class="help-bubble-icon">?</span>
  Need help?
</a>

</body>
</html>
