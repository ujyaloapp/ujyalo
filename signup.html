<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign up — Ujyalo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles/main.css">

</head>
<body>
<div id="site-nav"></div>
<div style="padding:60px 0 80px;background:var(--ink-50);">
  <div class="container-tiny animate-up">
    <div style="background:linear-gradient(135deg,var(--sun-50) 0%,var(--sun-light) 100%);border:1px solid var(--sun-light);border-radius:var(--radius-lg);padding:20px;text-align:center;margin-bottom:24px;">
      <div style="font-size:24px;margin-bottom:6px;">🚀</div>
      <h2 class="font-display" style="font-size:20px;font-weight:600;color:#854F0B;margin-bottom:6px;">Sign-ups opening soon</h2>
      <p style="font-size:13px;color:#854F0B;line-height:1.5;">Join the waitlist and we'll email you the moment it's ready.</p>
    </div>
    <div class="card" style="padding:32px;">
      <h3 class="font-display" style="font-size:20px;font-weight:600;margin-bottom:8px;">Join the waitlist</h3>
      <p class="text-muted mb-6" style="font-size:14px;">Be among the first 100 students. Get early access + 1 month free of the Student plan.</p>
      <div class="field"><label>Your full name</label><input type="text" class="input" placeholder="Rajan Sharma"></div>
      <div class="field"><label>Email</label><input type="email" class="input" placeholder="rajan@example.com"></div>
      <div class="field"><label>I am a...</label><select class="select"><option>Student preparing for SEE</option><option>Parent</option><option>Teacher</option><option>School representative</option></select></div>
      <button class="btn btn-blue btn-block">Join the waitlist →</button>
      <p class="text-muted text-center mt-6" style="font-size:12px;">We'll never spam. Just one email when we launch.</p>
    </div>
    <div class="text-center mt-6">
      <p class="text-muted" style="font-size:14px;margin-bottom:8px;">Want to try it now?</p>
      <a href="/practice.html" style="color:var(--brand);font-weight:600;font-size:14px;">Try the practice demo →</a>
    </div>
  </div>
</div>
<div id="site-footer"></div>
<script src="/scripts/components.js"></script>
</body></html>
