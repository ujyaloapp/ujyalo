ƒ<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- SEO meta tags injected dynamically from Supabase data -->
  <title>SEE Past Paper | Ujyalo</title>
  <meta name="description" content="SEE past paper — free bilingual Nepali and English with clean diagrams. Download PDF free." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,700;9..144,1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles/main.css" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --paper-bg: #fffef9;
      --paper-border: #d4c9a8;
      --ink: #1a1208;
      --ink-mid: #4a3f2a;
      --ink-light: #8a7a5a;
      --rule-line: rgba(37,99,235,0.08);
    }

    body { background: #f0ede6; font-family: 'Plus Jakarta Sans', sans-serif; }

    /* ── LAYOUT ── */
    .pp-page { max-width: 920px; margin: 0 auto; padding: 20px 16px 60px; }

    /* ── TOP BAR ── */
    .pp-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; margin-bottom: 16px;
      border-bottom: 1px solid rgba(0,0,0,0.1);
      flex-wrap: wrap; gap: 8px;
    }
    .pp-breadcrumb {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: #64748b;
    }
    .pp-breadcrumb a { color: #64748b; text-decoration: none; }
    .pp-breadcrumb a:hover { color: #2563EB; }
    .pp-breadcrumb span { color: #cbd5e1; }
    .pp-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .pp-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 8px;
      font-size: 13px; font-weight: 700; font-family: inherit;
      cursor: pointer; border: none; transition: all .2s;
      text-decoration: none;
    }
    .pp-btn-dl { background: #0f172a; color: white; }
    .pp-btn-dl:hover { background: #1e293b; }
    .pp-btn-notify { background: #2563EB; color: white; }
    .pp-btn-notify:hover { background: #1d4ed8; }
    .pp-btn-admin { background: #f59e0b; color: #1a1208; }
    .pp-btn-admin:hover { background: #d97706; }

    /* ── INFO STRIP ── */
    .paper-info-strip {
      display: grid; grid-template-columns: repeat(5,1fr); gap: 10px;
      margin-bottom: 16px;
    }
    .pis-card {
      background: white; border: 1px solid #e2e8f0;
      border-radius: 10px; padding: 10px 12px; text-align: center;
    }
    .pis-label { font-size: 9px; font-weight: 700; color: #94a3b8;
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 3px; }
    .pis-value { font-family: 'Fraunces', serif; font-size: 1.2rem;
      font-weight: 700; color: #0f172a; line-height: 1; }
    .pis-sub { font-size: 10px; color: #64748b; margin-top: 2px; }

    /* ── STATUS BANNER ── */
    .status-banner {
      border-radius: 10px; padding: 14px 18px;
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 16px; font-size: 13px;
    }
    .status-banner.draft {
      background: #FEF3C7; border: 1px solid #FCD34D;
    }
    .status-banner.live {
      background: #E1F5EE; border: 1px solid #1D9E75;
    }
    .status-banner-icon { font-size: 20px; flex-shrink: 0; }
    .status-banner-text { flex: 1; }
    .status-banner-title { font-weight: 700; color: #0f172a; margin-bottom: 2px; }
    .status-banner-sub { color: #64748b; font-size: 12px; }
    .status-banner-btn {
      background: #2563EB; color: white;
      border: none; padding: 8px 14px; border-radius: 7px;
      font-size: 12px; font-weight: 700; cursor: pointer;
      font-family: inherit; text-decoration: none;
      white-space: nowrap; flex-shrink: 0;
    }

    /* ── PAPER CARD ── */
    .paper-card {
      background: var(--paper-bg);
      border: 1px solid var(--paper-border);
      border-radius: 4px;
      box-shadow:
        0 2px 8px rgba(0,0,0,.05),
        0 20px 60px rgba(0,0,0,.08),
        4px 4px 0 #e8dfc8,
        8px 8px 0 #ddd4bc;
      overflow: hidden; position: relative;
    }
    .paper-card::before {
      content: ''; position: absolute; inset: 0;
      background-image: repeating-linear-gradient(
        transparent, transparent 31px,
        var(--rule-line) 31px, var(--rule-line) 32px
      );
      pointer-events: none; z-index: 0;
    }
    .paper-card::after {
      content: ''; position: absolute;
      top: 0; bottom: 0; left: 58px;
      width: 1.5px; background: rgba(220,38,38,0.12);
      pointer-events: none; z-index: 0;
    }
    .paper-inner {
      position: relative; z-index: 1;
      padding: 0 32px 48px 72px;
    }

    /* ── PAPER HEADER ── */
    .paper-header {
      padding: 24px 0 18px; text-align: center;
      border-bottom: 2px solid var(--ink); margin-bottom: 20px;
      position: relative;
    }
    .paper-code {
      position: absolute; top: 24px; right: 0;
      font-size: 11px; font-weight: 700; color: var(--ink-mid);
      letter-spacing: 0.05em;
    }
    .paper-sym {
      position: absolute; top: 24px; left: 0;
      font-size: 11px; color: var(--ink-mid);
    }
    .paper-exam { font-family: 'Fraunces', serif; font-size: 15px;
      font-weight: 700; color: var(--ink); margin-bottom: 3px; }
    .paper-subject { font-family: 'Fraunces', serif; font-size: 18px;
      font-weight: 700; color: var(--ink); margin-bottom: 3px; }
    .paper-subject-np {
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 14px; color: var(--ink-mid); margin-bottom: 10px;
    }
    .paper-province-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: #0a0f1e; color: white;
      font-size: 10px; font-weight: 700;
      padding: 3px 12px; border-radius: 999px;
      letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 10px;
    }
    .paper-meta-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 10px; font-size: 11px; font-weight: 700;
      color: var(--ink); letter-spacing: 0.04em; text-transform: uppercase;
    }

    /* ── INSTRUCTIONS ── */
    .paper-instructions {
      background: rgba(37,99,235,0.04);
      border: 1px solid rgba(37,99,235,0.12);
      border-radius: 6px; padding: 12px 14px; margin-bottom: 20px;
    }
    .pi-np {
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 12px; color: var(--ink); line-height: 1.7;
      margin-bottom: 4px; font-style: italic;
    }
    .pi-en { font-size: 11px; font-weight: 600; color: var(--ink-mid); font-style: italic; }
    .pi-bold { font-size: 12px; font-weight: 700; color: var(--ink); margin-top: 5px; }

    /* ── QUESTIONS ── */
    .q-block { margin-bottom: 24px; }
    .q-main { display: grid; grid-template-columns: 22px 1fr; gap: 8px; margin-bottom: 6px; }
    .q-num { font-weight: 700; font-size: 13px; color: var(--ink); padding-top: 1px; }
    .q-np {
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 12.5px; color: var(--ink); line-height: 1.8; margin-bottom: 3px;
    }
    .q-en { font-size: 12.5px; color: var(--ink-mid); line-height: 1.7; }
    .q-en strong { color: var(--ink); font-weight: 700; }
    .q-subs { padding-left: 30px; }
    .q-sub { display: grid; grid-template-columns: 26px 1fr auto; gap: 5px;
      margin-bottom: 7px; align-items: start; }
    .q-sub-letter { font-size: 12.5px; color: var(--ink-mid); font-weight: 600; padding-top: 1px; }
    .q-marks { font-size: 11px; font-weight: 700; color: var(--ink-mid);
      white-space: nowrap; padding-top: 2px; }
    .q-divider { border: none; border-top: 0.5px solid var(--paper-border);
      margin: 4px 0 14px; }
    .q-table { width: auto; border-collapse: collapse; margin: 8px 0 8px 30px; font-size: 11px; }
    .q-table th, .q-table td { border: 1px solid var(--ink); padding: 4px 10px; text-align: center; }
    .q-table th { background: #f0ede6; font-weight: 700;
      font-family: 'Noto Sans Devanagari', sans-serif; font-size: 11px; }
    .th-en { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 9px;
      color: var(--ink-mid); display: block; font-weight: 600; }
    .q-diagram { margin: 10px 0 10px 30px; background: white;
      border: 1px solid var(--paper-border); border-radius: 5px;
      padding: 14px; display: inline-block; }
    .q-diagram-label { font-size: 9px; font-weight: 600; color: var(--ink-light);
      text-transform: uppercase; letter-spacing: 0.08em; margin-top: 5px; text-align: center; }
    .math { font-family: 'Times New Roman', serif; font-style: italic; font-size: 13px; }
    .frac { display: inline-flex; flex-direction: column; align-items: center;
      vertical-align: middle; font-size: 11px; margin: 0 2px; }
    .frac-num { border-bottom: 1px solid var(--ink); padding: 0 3px; }
    .frac-den { padding: 0 3px; }

    /* ── LOADING / ERROR STATES ── */
    .state-loading {
      text-align: center; padding: 80px 24px;
      background: var(--paper-bg);
    }
    .spinner { width: 36px; height: 36px; border: 3px solid #e2e8f0;
      border-top-color: #2563EB; border-radius: 50%;
      animation: spin .8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .state-error { text-align: center; padding: 80px 24px;
      background: var(--paper-bg); }

    /* ── COMING SOON (non-admin) ── */
    .coming-soon-wrap {
      background: #0a0f1e; border-radius: 16px;
      padding: 56px 32px; text-align: center;
      position: relative; overflow: hidden; margin-bottom: 20px;
    }
    .coming-soon-wrap::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(37,99,235,.2) 0%, transparent 60%);
      pointer-events: none;
    }
    .cs-inner { position: relative; z-index: 1; max-width: 520px; margin: 0 auto; }
    .cs-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(245,158,11,.15); border: 1px solid rgba(245,158,11,.3);
      color: #fcd34d; font-size: 10px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      padding: 4px 12px; border-radius: 999px; margin-bottom: 20px;
    }
    .cs-title { font-family: 'Fraunces', serif;
      font-size: clamp(1.8rem,4vw,3rem); font-weight: 700;
      color: white; line-height: 1.1; letter-spacing: -.02em; margin-bottom: 14px; }
    .cs-title em { font-style: italic;
      background: linear-gradient(135deg,#60a5fa,#34d399);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; }
    .cs-sub { font-size: 15px; color: rgba(255,255,255,.5);
      line-height: 1.7; margin-bottom: 28px; }
    .cs-stats { display: flex; gap: 10px; justify-content: center;
      flex-wrap: wrap; margin-bottom: 28px; }
    .cs-stat { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px; padding: 14px 18px; text-align: center; min-width: 100px; }
    .cs-stat-num { font-family: 'Fraunces', serif; font-size: 1.6rem;
      font-weight: 700; color: white; line-height: 1; }
    .cs-stat-label { font-size: 10px; color: rgba(255,255,255,.4); margin-top: 3px; }
    .cs-features { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px; padding: 20px; margin: 0 auto 24px; text-align: left; }
    .cs-feature { display: flex; gap: 8px; font-size: 12px;
      color: rgba(255,255,255,.6); margin-bottom: 8px; line-height: 1.5; }
    .cs-feature:last-child { margin-bottom: 0; }
    .cs-feature-icon { flex-shrink: 0; }
    .cs-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .cs-btn-primary { background: #2563EB; color: white; padding: 13px 24px;
      border-radius: 9px; font-size: 13px; font-weight: 700;
      text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
    .cs-btn-secondary { background: rgba(255,255,255,.08); color: white;
      padding: 13px 24px; border-radius: 9px; font-size: 13px; font-weight: 700;
      text-decoration: none; border: 1px solid rgba(255,255,255,.12); }

    /* ── PRINT ── */

    /* Answer reveal buttons */
    .answer-reveal-btn {
      display: inline-flex; align-items: center; gap: 5px;
      margin-top: 8px; padding: 6px 12px;
      background: #EFF6FF; color: #2563EB;
      border: 1.5px solid #bfdbfe; border-radius: 8px;
      font-size: 12px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: all .2s;
    }
    .answer-reveal-btn::before { content: '💡'; font-size: 11px; }
    .answer-reveal-btn:hover { background: #2563EB; color: white; border-color: #2563EB; }
    .answer-reveal-btn.active { background: #f1f5f9; color: #64748b; border-color: #e2e8f0; }
    .answer-reveal-btn.active::before { content: '🙈'; }
    .answer-box { margin-top: 10px; border-radius: 10px; overflow: hidden; }
    .answer-box.hidden { display: none; }
    .answer-label {
      background: #1D9E75; color: white;
      font-size: 10px; font-weight: 700; padding: 5px 12px;
      text-transform: uppercase; letter-spacing: .08em;
    }
    .answer-text {
      background: #f0fdf4; border: 1px solid #bbf7d0;
      border-top: none; padding: 12px 14px;
      font-size: 13px; color: #0f4c2a; line-height: 1.8;
      font-family: 'Plus Jakarta Sans', sans-serif;
      white-space: pre-wrap;
    }

    @media print {
      body { background: white; }
      .pp-topbar, .paper-info-strip, .status-banner,
      .coming-soon-wrap, #site-nav, #site-footer { display: none !important; }
      .paper-card { box-shadow: none; border: none; }
      .pp-page { padding: 0; max-width: 100%; }
      .paper-inner { padding: 0 20px 20px 20px; }
      .paper-card::after { display: none; }
    }

    @media (max-width: 640px) {
      .paper-inner { padding: 0 14px 32px 18px; }
      .paper-card::after { display: none; }
      .paper-info-strip { grid-template-columns: repeat(3,1fr); }
      .pp-topbar { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
<div id="site-nav"></div>

<div class="pp-page" id="pp-page">

  <!-- Top bar -->
  <div class="pp-topbar">
    <div class="pp-breadcrumb">
      <a href="/practice.html">Practice</a>
      <span>›</span>
      <a href="/see-past-papers.html">Past Papers</a>
      <span>›</span>
      <span id="breadcrumb-title">Loading...</span>
    </div>
    <div class="pp-actions" id="pp-actions">
      <button class="pp-btn pp-btn-dl" onclick="window.print()" style="display:none" id="btn-download">
        ⬇ Download PDF
      </button>
    </div>
  </div>

  <!-- Content injected here by JS -->
  <div id="pp-content">
    <div class="paper-card">
      <div class="state-loading">
        <div class="spinner"></div>
        <div style="font-size:14px;color:#64748b;">Loading paper...</div>
      </div>
    </div>
  </div>

</div>

<div id="site-footer"></div>
<script src="/scripts/components.js"></script>
<script>
// ════════════════════════════════════════════════════════
// PAST PAPER — Dynamic page
// URL: /see/past-papers/:year/:province/:subject
// Reads URL params, fetches from Supabase, renders paper
// ════════════════════════════════════════════════════════

// Paper data — hardcoded for now, will come from Supabase later
// Each paper has: meta + questions array
const PAPERS = {
  '2082-koshi-maths': {
    meta: {
      year: '2082',
      yearAD: '2026',
      province: 'Koshi',
      provinceNp: 'कोशी',
      subject: 'Compulsory Mathematics',
      subjectNp: 'अनिवार्य गणित',
      code: "RE - 1031'KoP",
      fullMarks: 75,
      timeHours: 3,
      status: 'live', // 'draft' = admin only, 'live' = everyone
      totalQuestions: 16,
    },
    questions: [] // populated below
  }
};

// ── Parse URL to get paper key ──
function getPaperKey() {
  const path = window.location.pathname;
  // Matches /see/past-papers/2082/koshi/maths
  const match = path.match(/\/see\/past-papers\/(\d+)\/([^\/]+)\/([^\/]+)/);
  if (match) return `${match[1]}-${match[2]}-${match[3]}`;
  // Fallback: check query string ?paper=2082-koshi-maths
  const params = new URLSearchParams(window.location.search);
  return params.get('paper') || '2082-koshi-maths';
}

// ── Check if current user is admin ──
function isAdmin() {
  const user = JSON.parse(localStorage.getItem('ujyalo_user') || 'null');
  return user && user.role === 'admin';
}

// ── Render the full paper ──
function renderPaper(paper) {
  const { meta } = paper;
  const admin = isAdmin();
  const isLive = meta.status === 'live';
  const canSee = isLive || admin;

  // Update breadcrumb
  document.getElementById('breadcrumb-title').textContent =
    `SEE ${meta.year} ${meta.province} ${meta.subject.replace('Compulsory ','')}`;

  // Update page title for SEO
  document.title = `SEE ${meta.year} ${meta.province} — ${meta.subject} | Ujyalo`;

  // Show download button
  if (canSee) {
    document.getElementById('btn-download').style.display = 'flex';
  }

  // Admin button
  if (admin) {
    const actions = document.getElementById('pp-actions');
    const adminBtn = document.createElement('button');
    adminBtn.className = 'pp-btn pp-btn-admin';
    adminBtn.innerHTML = '⚙ Admin view';
    adminBtn.onclick = () => {
      const panel = document.getElementById('admin-panel');
      if (panel) panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    };
    actions.insertBefore(adminBtn, actions.firstChild);
  }

  let html = '';

  // ── Info strip ──
  html += `
  <div class="paper-info-strip">
    <div class="pis-card">
      <div class="pis-label">Exam</div>
      <div class="pis-value">SEE</div>
      <div class="pis-sub">Grade 10</div>
    </div>
    <div class="pis-card">
      <div class="pis-label">Year</div>
      <div class="pis-value">${meta.year}</div>
      <div class="pis-sub">${meta.yearAD}</div>
    </div>
    <div class="pis-card">
      <div class="pis-label">Province</div>
      <div class="pis-value" style="font-size:.95rem;">${meta.province}</div>
      <div class="pis-sub">${meta.code}</div>
    </div>
    <div class="pis-card">
      <div class="pis-label">Marks</div>
      <div class="pis-value">${meta.fullMarks}</div>
      <div class="pis-sub">${meta.timeHours} hours</div>
    </div>
    <div class="pis-card">
      <div class="pis-label">Questions</div>
      <div class="pis-value">${meta.totalQuestions}</div>
      <div class="pis-sub">All required</div>
    </div>
  </div>`;

  // ── Admin status banner ──
  if (admin) {
    if (isLive) {
      html += `
      <div class="status-banner live">
        <div class="status-banner-icon">✅</div>
        <div class="status-banner-text">
          <div class="status-banner-title">Published — visible to all students</div>
          <div class="status-banner-sub">This paper is live. Students can see the full paper.</div>
        </div>
      </div>`;
    } else {
      html += `
      <div class="status-banner draft">
        <div class="status-banner-icon">⚠️</div>
        <div class="status-banner-text">
          <div class="status-banner-title">Draft — only you can see this</div>
          <div class="status-banner-sub">Students see a "coming soon" page. Publish when the paper is ready.</div>
        </div>
        <a href="/admin.html" class="status-banner-btn">Manage in Admin →</a>
      </div>`;
    }
  }

  // ── Coming soon for non-admins ──
  if (!canSee) {
    html += renderComingSoon(meta);
    document.getElementById('pp-content').innerHTML = html;
    return;
  }

  // Answers now included - no banner needed

  // ── The actual paper ──
  html += renderFullPaper(meta);

  document.getElementById('pp-content').innerHTML = html;
}

function renderComingSoon(meta) {
  return `
  <div class="coming-soon-wrap">
    <div class="cs-inner">
      <div class="cs-badge">⚙ Coming Soon</div>
      <h1 class="cs-title">
        SEE ${meta.year} ${meta.province}<br>
        <em>${meta.subject.replace('Compulsory ','')}</em>
      </h1>
      <p class="cs-sub">
        The full bilingual paper — Nepali and English, with clean diagrams — is being prepared.
        Sign up to be notified the moment it goes live.
      </p>
      <div class="cs-stats">
        <div class="cs-stat">
          <div class="cs-stat-num">${meta.totalQuestions}</div>
          <div class="cs-stat-label">Questions</div>
        </div>
        <div class="cs-stat">
          <div class="cs-stat-num">${meta.fullMarks}</div>
          <div class="cs-stat-label">Full Marks</div>
        </div>
        <div class="cs-stat">
          <div class="cs-stat-num">${meta.timeHours}h</div>
          <div class="cs-stat-label">Duration</div>
        </div>
        <div class="cs-stat">
          <div class="cs-stat-num">NE</div>
          <div class="cs-stat-label">Bilingual</div>
        </div>
      </div>
      <div class="cs-features">
        <div class="cs-feature"><span class="cs-feature-icon" style="color:#34d399;">✓</span> Full paper in Nepali and English</div>
        <div class="cs-feature"><span class="cs-feature-icon" style="color:#34d399;">✓</span> Clean diagrams for every geometry question</div>

function q(num, np, en) {
  return `

}

function sub(letter, np, en, marks) {
  return `

}

// Add reveal button to each sub-part
function addAnswerButtons() {
  document.querySelectorAll('.q-sub').forEach(sub => {
    const letter = sub.querySelector('.q-sub-letter');
    const marks = sub.querySelector('.q-marks');
    if (!letter || !marks) return;
    
    // Get question number from parent
    const block = sub.closest('.q-block');
    if (!block) return;
    const qnum = block.querySelector('.q-num');
    if (!qnum) return;
    const num = qnum.textContent.replace('.','').trim();
    const let_ = letter.textContent.replace(/[()]/g,'').trim().toLowerCase();
    const key = 'Q' + num + let_.toUpperCase();
    
    if (!ANSWERS[key]) return;
    
    // Add reveal button
    const btn = document.createElement('button');
    btn.className = 'answer-reveal-btn';
    btn.textContent = 'See answer';
    btn.onclick = function() { toggleAnswer(key, this); };
    
    const ansDiv = document.createElement('div');
    ansDiv.className = 'answer-box hidden';
    ansDiv.id = 'ans-' + key;
    ansDiv.innerHTML = '<div class="answer-label">✓ Model Answer</div><div class="answer-text">' + 
      ANSWERS[key].replace(/\n/g, '<br>') + '</div>';
    
    sub.appendChild(btn);
    sub.appendChild(ansDiv);
  });
}

function toggleAnswer(key, btn) {
  const box = document.getElementById('ans-' + key);
  if (!box) return;
  const isHidden = box.classList.contains('hidden');
  box.classList.toggle('hidden', !isHidden);
  btn.textContent = isHidden ? 'Hide answer' : 'See answer';
  btn.classList.toggle('active', isHidden);
}

// ── Init ──
document.addEventListener('DOMContentLoaded', function() {
  // Add answer buttons after paper renders
  setTimeout(addAnswerButtons, 100);
  const key = getPaperKey();
  const paper = PAPERS[key];
  if (paper) {
    renderPaper(paper);
  } else {
    document.getElementById('pp-content').innerHTML = `
      <div class="paper-card">
        <div class="state-error">
          <div style="font-size:48px;margin-bottom:12px;">📄</div>
          <div style="font-family:'Fraunces',serif;font-size:20px;font-weight:700;color:#0f172a;margin-bottom:8px;">Paper not found</div>
          <div style="font-size:14px;color:#64748b;margin-bottom:20px;">This paper doesn't exist or hasn't been added yet.</div>
          <a href="/see-past-papers.html" style="background:#2563EB;color:white;padding:10px 20px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:700;">← All past papers</a>
        </div>
      </div>`;
  }
});
