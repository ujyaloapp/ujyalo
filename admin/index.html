<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Ujyalo</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles/main.css">
</head>
<body class="admin-bg">

<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px;">
  <div style="width: 100%; max-width: 380px;" class="animate-up">

    <div class="text-center mb-8">
      <a href="/" class="logo" style="color: var(--sun); justify-content: center; margin-bottom: 8px;">
        <svg width="22" height="22" viewBox="0 0 32 32" fill="none">
          <circle cx="16" cy="16" r="6" fill="#F59E0B"/>
          <g stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round">
            <line x1="16" y1="2" x2="16" y2="6"/><line x1="16" y1="26" x2="16" y2="30"/>
            <line x1="2" y1="16" x2="6" y2="16"/><line x1="26" y1="16" x2="30" y2="16"/>
            <line x1="6" y1="6" x2="9" y2="9"/><line x1="23" y1="23" x2="26" y2="26"/>
            <line x1="26" y1="6" x2="23" y2="9"/><line x1="9" y1="23" x2="6" y2="26"/>
          </g>
        </svg>
        ujyalo
      </a>
      <span class="admin-tag">Admin</span>
    </div>

    <div class="admin-card">
      <h1 class="font-display" style="font-size: 22px; font-weight: 600; margin-bottom: 4px;">Admin login</h1>
      <p style="font-size: 13px; color: var(--ink-300); margin-bottom: 24px;">Authorised personnel only.</p>

      <div class="field">
        <label class="admin-label">Email</label>
        <input type="email" class="admin-input" placeholder="hello@ujyalo.app">
      </div>
      <div class="field">
        <label class="admin-label">Password</label>
        <input type="password" class="admin-input" placeholder="Your password">
      </div>

      <a href="/admin/dashboard.html" class="btn btn-sun btn-block mt-4">Log in →</a>
    </div>

    <p class="text-center mt-6" style="font-size: 12px; color: var(--ink-300);">
      <a href="/" style="color: var(--ink-300);">← Back to ujyalo.app</a>
    </p>
  </div>
</div>

</body>
</html>
