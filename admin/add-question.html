<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Question — Admin · Ujyalo</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles/main.css">
</head>
<body class="admin-bg">

<nav class="nav-admin">
  <div class="container nav-inner">
    <a href="/admin/dashboard.html" class="logo" style="color: var(--sun);">
      <svg width="22" height="22" viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="6" fill="#F59E0B"/>
        <g stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round">
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="16" y1="26" x2="16" y2="30"/>
          <line x1="2" y1="16" x2="6" y2="16"/><line x1="26" y1="16" x2="30" y2="16"/>
          <line x1="6" y1="6" x2="9" y2="9"/><line x1="23" y1="23" x2="26" y2="26"/>
          <line x1="26" y1="6" x2="23" y2="9"/><line x1="9" y1="23" x2="6" y2="26"/>
        </g>
      </svg>
      ujyalo<span class="admin-tag">Admin</span>
    </a>
    <div class="nav-links">
      <a href="/admin/dashboard.html">Dashboard</a>
      <a href="/admin/questions.html" class="active">Questions</a>
      <a href="/admin/students.html">Students</a>
      <a href="/admin/papers.html">Past Papers</a>
    </div>
    <div class="nav-actions">
      <a href="/admin/index.html" style="font-size: 13px; color: var(--ink-300);">Sign out</a>
    </div>
  </div>
</nav>

<main class="container-narrow" style="padding: 48px 24px;">

  <a href="/admin/dashboard.html" style="font-size: 13px; color: var(--ink-300); display: inline-flex; align-items: center; gap: 4px; margin-bottom: 16px;">← Back to dashboard</a>

  <div class="animate-up mb-8">
    <h1 class="font-display" style="font-size: 32px; font-weight: 600; color: white; letter-spacing: -0.5px;">
      Add a new question
    </h1>
    <p style="font-size: 14px; color: var(--ink-300);">It will be available to students immediately after saving.</p>
  </div>

  <div class="admin-card animate-up delay-1">

    <!-- Subject / Chapter / Difficulty -->
    <div class="grid-3" style="gap: 12px; margin-bottom: 16px;">
      <div>
        <label class="admin-label">Subject</label>
        <select class="admin-select">
          <option>Compulsory Maths</option>
          <option>Science</option>
          <option>Compulsory English</option>
          <option>Social Studies</option>
          <option>Compulsory Nepali</option>
        </select>
      </div>
      <div>
        <label class="admin-label">Chapter</label>
        <select class="admin-select">
          <option>Algebra</option>
          <option>Geometry</option>
          <option>Trigonometry</option>
          <option>Statistics</option>
          <option>Mensuration</option>
        </select>
      </div>
      <div>
        <label class="admin-label">Difficulty</label>
        <select class="admin-select">
          <option>Easy</option>
          <option>Medium</option>
          <option>Hard</option>
        </select>
      </div>
    </div>

    <!-- Question -->
    <div class="field">
      <label class="admin-label">Question</label>
      <textarea class="admin-textarea" placeholder="If 2x + 5 = 13, find the value of x." rows="3"></textarea>
    </div>

    <!-- Marks -->
    <div class="grid-2" style="gap: 12px; margin-bottom: 16px;">
      <div>
        <label class="admin-label">Marks</label>
        <select class="admin-select">
          <option>1 mark</option>
          <option>2 marks</option>
          <option>5 marks</option>
        </select>
      </div>
      <div>
        <label class="admin-label">Question type</label>
        <select class="admin-select">
          <option>Short answer</option>
          <option>Long answer</option>
          <option>Numerical</option>
          <option>MCQ</option>
        </select>
      </div>
    </div>

    <!-- Correct answer -->
    <div class="field">
      <label class="admin-label">Correct answer</label>
      <input type="text" class="admin-input" placeholder="x = 4">
    </div>

    <!-- Explanation -->
    <div class="field">
      <label class="admin-label">Explanation (shown to student after they answer)</label>
      <textarea class="admin-textarea" placeholder="Subtract 5 from both sides: 2x = 8. Then divide by 2: x = 4." rows="3"></textarea>
    </div>

    <!-- Source -->
    <div class="field">
      <label class="admin-label">Source (optional)</label>
      <input type="text" class="admin-input" placeholder="SEE 2080 past paper / CDC textbook ch. 3">
    </div>

    <!-- Tags -->
    <div class="field">
      <label class="admin-label">Tags (optional, comma-separated)</label>
      <input type="text" class="admin-input" placeholder="linear-equations, basic, easy-points">
    </div>

    <!-- Buttons -->
    <div class="flex gap-3 mt-6 flex-wrap">
      <button class="btn btn-sun">Save question</button>
      <button class="btn" style="background: transparent; color: var(--ink-300); border: 1px solid rgba(255,255,255,0.15);">Save and add another</button>
      <a href="/admin/dashboard.html" class="btn-ghost" style="color: var(--ink-300);">Cancel</a>
    </div>
  </div>

</main>

</body>
</html>
