<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Ujyalo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles/main.css">
</head>
<body>
<div id="site-nav"></div>
<div style="padding:60px 0 80px;background:var(--ink-50);">
  <div class="container-tiny animate-up">
    <div class="card" style="padding:32px;">

      <!-- Loading -->
      <div id="step-loading" style="text-align:center;padding:16px 0;">
        <div style="font-size:32px;margin-bottom:12px;">⏳</div>
        <p style="font-size:14px;color:var(--ink-500);">Verifying your reset link...</p>
      </div>

      <!-- Invalid/expired -->
      <div id="step-invalid" class="hidden" style="text-align:center;padding:16px 0;">
        <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
        <h3 class="font-display" style="font-size:22px;font-weight:600;margin-bottom:8px;">Link expired</h3>
        <p class="text-muted" style="font-size:14px;margin-bottom:24px;">This reset link has expired or already been used.</p>
        <a href="/forgot-password.html" class="btn btn-blue">Request a new link →</a>
      </div>

      <!-- Reset form -->
      <div id="step-form" class="hidden">
        <h3 class="font-display" style="font-size:22px;font-weight:600;margin-bottom:6px;">Set a new password</h3>
        <p class="text-muted mb-6" style="font-size:14px;">Choose a strong password for your Ujyalo account.</p>
        <div id="error-msg" class="hidden" style="background:#FEE2E2;border:1px solid #FECACA;border-radius:var(--radius-md);padding:12px 16px;margin-bottom:16px;font-size:14px;color:#B91C1C;"></div>
        <div class="field">
          <label>New password</label>
          <input type="password" class="input" id="input-password" placeholder="At least 8 characters">
        </div>
        <div class="field">
          <label>Confirm new password</label>
          <input type="password" class="input" id="input-confirm" placeholder="Same password again">
        </div>
        <button class="btn btn-blue btn-block" id="submit-btn" onclick="resetPassword()">Save new password →</button>
      </div>

      <!-- Success -->
      <div id="step-success" class="hidden" style="text-align:center;padding:16px 0;">
        <div style="font-size:48px;margin-bottom:16px;">✅</div>
        <h3 class="font-display" style="font-size:22px;font-weight:600;margin-bottom:8px;">Password updated!</h3>
        <p class="text-muted" style="font-size:14px;margin-bottom:24px;">Your password has been changed successfully.</p>
        <a href="/login.html" class="btn btn-blue">Go to login →</a>
      </div>

    </div>
  </div>
</div>
<div id="site-footer"></div>
<script src="/scripts/components.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL  = 'https://uigausnyrlxxyosxjgvi.supabase.co';

// We need the anon key — get it from auth-config
async function getAnonKey() {
  const res = await fetch('/api/auth-config');
  const data = await res.json();
  return data.anon_key || data.anonKey;
}

function show(id) {
  ['step-loading','step-invalid','step-form','step-success'].forEach(s => {
    document.getElementById(s).classList.add('hidden');
  });
  document.getElementById(id).classList.remove('hidden');
}

window.addEventListener('load', async function() {
  try {
    const anonKey = await getAnonKey();
    const supabase = window.supabase.createClient(SUPABASE_URL, anonKey);

    // Check URL hash for tokens
    const hash = window.location.hash;
    const params = new URLSearchParams(hash.substring(1));
    const accessToken  = params.get('access_token');
    const refreshToken = params.get('refresh_token');
    const type         = params.get('type');

    if (accessToken && type === 'recovery') {
      // Set the session so Supabase knows who we are
      const { error } = await supabase.auth.setSession({
        access_token:  accessToken,
        refresh_token: refreshToken || '',
      });

      if (error) {
        show('step-invalid');
        return;
      }

      window._supabase = supabase;
      show('step-form');

    } else {
      // No valid token — check if already logged in from recovery redirect
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        window._supabase = supabase;
        show('step-form');
      } else {
        show('step-invalid');
      }
    }
  } catch(e) {
    console.error('Reset page error:', e);
    show('step-invalid');
  }
});

async function resetPassword() {
  const password = document.getElementById('input-password').value;
  const confirm  = document.getElementById('input-confirm').value;
  const btn      = document.getElementById('submit-btn');
  hideError();

  if (!password)           { showError('Please enter a new password.'); return; }
  if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }
  if (password !== confirm) { showError('Passwords do not match.'); return; }

  btn.disabled = true;
  btn.textContent = 'Saving...';

  try {
    const { error } = await window._supabase.auth.updateUser({ password });

    if (error) {
      showError(error.message || 'Something went wrong. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Save new password →';
      return;
    }

    // Sign out so they log in fresh with new password
    await window._supabase.auth.signOut();
    localStorage.removeItem('ujyalo_token');
    localStorage.removeItem('ujyalo_user');

    show('step-success');

  } catch(e) {
    showError('Something went wrong. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Save new password →';
  }
}

function showError(msg) {
  const e = document.getElementById('error-msg');
  e.textContent = msg;
  e.classList.remove('hidden');
}
function hideError() {
  document.getElementById('error-msg').classList.add('hidden');
}
</script>
</body>
</html>
