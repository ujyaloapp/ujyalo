<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Ujyalo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles/main.css">
</head>
<body>
<div id="site-nav"></div>
<div style="padding:60px 0 80px;background:var(--ink-50);">
  <div class="container-tiny animate-up">
    <div class="card" style="padding:32px;">

      <!-- Invalid/expired link -->
      <div id="step-invalid" class="hidden" style="text-align:center;padding:16px 0;">
        <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
        <h3 class="font-display" style="font-size:22px;font-weight:600;margin-bottom:8px;">Link expired</h3>
        <p class="text-muted" style="font-size:14px;margin-bottom:24px;">This reset link has expired or already been used.</p>
        <a href="/forgot-password.html" class="btn btn-blue">Request a new link →</a>
      </div>

      <!-- Reset form -->
      <div id="step-form" class="hidden">
        <h3 class="font-display" style="font-size:22px;font-weight:600;margin-bottom:6px;">Set a new password</h3>
        <p class="text-muted mb-6" style="font-size:14px;">Choose a strong password for your Ujyalo account.</p>

        <div id="error-msg" class="hidden" style="background:#FEE2E2;border:1px solid #FECACA;border-radius:var(--radius-md);padding:12px 16px;margin-bottom:16px;font-size:14px;color:#B91C1C;"></div>

        <div class="field">
          <label>New password</label>
          <input type="password" class="input" id="input-password" placeholder="At least 8 characters">
        </div>
        <div class="field">
          <label>Confirm new password</label>
          <input type="password" class="input" id="input-confirm" placeholder="Same password again">
        </div>

        <button class="btn btn-blue btn-block" id="submit-btn" onclick="resetPassword()">
          Save new password →
        </button>
      </div>

      <!-- Success -->
      <div id="step-success" class="hidden" style="text-align:center;padding:16px 0;">
        <div style="font-size:48px;margin-bottom:16px;">✅</div>
        <h3 class="font-display" style="font-size:22px;font-weight:600;margin-bottom:8px;">Password updated!</h3>
        <p class="text-muted" style="font-size:14px;margin-bottom:24px;">Your password has been changed. You can now log in with your new password.</p>
        <a href="/login.html" class="btn btn-blue">Go to login →</a>
      </div>

    </div>
  </div>
</div>
<div id="site-footer"></div>
<script src="/scripts/components.js"></script>
<script>
// Supabase project details
const SUPABASE_URL = 'https://uigausnyrlxxyosxjgvi.supabase.co';

// On load — check if we have a valid recovery token in the URL
window.addEventListener('load', async function() {
  // Supabase puts the token in the URL hash like: #access_token=xxx&type=recovery
  const hash = window.location.hash;
  const params = new URLSearchParams(hash.substring(1)); // remove the #
  const accessToken = params.get('access_token');
  const type = params.get('type');

  if (accessToken && type === 'recovery') {
    // Valid recovery link — store token temporarily and show form
    window.resetToken = accessToken;
    document.getElementById('step-form').classList.remove('hidden');
  } else {
    // No valid token — show invalid/expired message
    document.getElementById('step-invalid').classList.remove('hidden');
  }
});

async function resetPassword() {
  const password = document.getElementById('input-password').value;
  const confirm  = document.getElementById('input-confirm').value;
  const btn      = document.getElementById('submit-btn');
  hideError();

  if (!password)            { showError('Please enter a new password.'); return; }
  if (password.length < 8)  { showError('Password must be at least 8 characters.'); return; }
  if (password !== confirm)  { showError('Passwords do not match.'); return; }

  btn.disabled = true;
  btn.textContent = 'Saving...';

  try {
    // Use Supabase REST API to update password with the recovery token
    const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${window.resetToken}`,
        'apikey': await getAnonKey()
      },
      body: JSON.stringify({ password })
    });

    const data = await res.json();

    if (res.ok) {
      document.getElementById('step-form').classList.add('hidden');
      document.getElementById('step-success').classList.remove('hidden');
    } else {
      showError(data.message || 'Something went wrong. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Save new password →';
    }
  } catch (e) {
    showError('Something went wrong. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Save new password →';
  }
}

async function getAnonKey() {
  // Get anon key from our auth-config endpoint
  const res = await fetch('/api/auth-config');
  const data = await res.json();
  return data.anonKey;
}

function showError(msg) { const e = document.getElementById('error-msg'); e.textContent = msg; e.classList.remove('hidden'); }
function hideError() { document.getElementById('error-msg').classList.add('hidden'); }
</script>
</body>
</html>
