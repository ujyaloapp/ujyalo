<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirming your account — Ujyalo</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles/main.css">
<style>
  .confirm-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--ink-50); padding:24px; }
  .confirm-card { background:white; border-radius:20px; padding:48px 40px; text-align:center; max-width:420px; width:100%; box-shadow:0 4px 24px rgba(10,22,40,0.08); }
  .confirm-icon { font-size:56px; margin-bottom:16px; }
  .confirm-title { font-family:'Fraunces',serif; font-size:24px; font-weight:700; margin-bottom:8px; color:var(--ink-900); }
  .confirm-sub { font-size:15px; color:var(--ink-500); line-height:1.65; margin-bottom:24px; }
  .spinner { width:36px; height:36px; border:3px solid var(--ink-100); border-top-color:var(--brand); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="confirm-wrap">
  <div class="confirm-card">

    <div id="state-loading">
      <div class="spinner"></div>
      <div class="confirm-title">Please wait...</div>
      <div class="confirm-sub">Verifying your link.</div>
    </div>

    <div id="state-success" class="hidden">
      <div class="confirm-icon">🎉</div>
      <div class="confirm-title">Email confirmed!</div>
      <div class="confirm-sub">Welcome to Ujyalo. Taking you to your dashboard now...</div>
    </div>

    <div id="state-error" class="hidden">
      <div class="confirm-icon">😕</div>
      <div class="confirm-title">Something went wrong</div>
      <div class="confirm-sub" id="error-msg">The link may have expired. Please try again.</div>
      <a href="/login.html" class="btn btn-blue" style="display:inline-block;margin-top:8px;">Go to login →</a>
    </div>

  </div>
</div>

<script>
async function init() {
  try {
    const res  = await fetch('/api/auth?action=config');
    const data = await res.json();
    window._sbUrl = data.url;
    window._sbKey = data.anon_key;
  } catch(e) {}
  handleConfirmation();
}

async function handleConfirmation() {
  const hash   = window.location.hash.substring(1);
  const params = new URLSearchParams(hash || window.location.search);

  const accessToken = params.get('access_token');
  const type        = params.get('type');
  const errorDesc   = params.get('error_description');

  if (errorDesc) {
    showError(decodeURIComponent(errorDesc));
    return;
  }

  if (!accessToken) {
    window.location.href = '/login.html';
    return;
  }

  // PASSWORD RECOVERY
  if (type === 'recovery') {
    window.location.href = `/reset-password.html${window.location.hash}`;
    return;
  }

  // EMAIL CONFIRMATION
  try {
    // Step 1: Get auth user data using the access token
    const res = await fetch(`${window._sbUrl}/auth/v1/user`, {
      headers: {
        'apikey': window._sbKey,
        'Authorization': `Bearer ${accessToken}`
      }
    });
    const userData = await res.json();

    if (!userData.id) {
      showError('Could not verify your account. Please try logging in.');
      return;
    }

    // Step 2: Get role securely via our API (uses service role key server-side)
    const roleRes = await fetch(
      `/api/auth?action=get-role&id=${userData.id}`,
      {
        headers: { 'Authorization': `Bearer ${accessToken}` }
      }
    );
    if (!roleRes.ok) {
      // Couldn't determine the role — don't guess (that could send an admin/editor
      // to the wrong place). Send them to log in, where the server routes correctly.
      window.location.href = '/login.html';
      return;
    }
    const roleData = await roleRes.json();
    const role = roleData?.role || 'student';

    // Step 3: Save to localStorage
    localStorage.setItem('ujyalo_token', accessToken);
    localStorage.setItem('ujyalo_user', JSON.stringify({
      id:        userData.id,
      email:     userData.email,
      full_name: roleData?.full_name || userData.user_metadata?.full_name || '',
      role
    }));

    show('state-success');
    hide('state-loading');

    // Step 4: Redirect based on role
    let redirectTo = '/dashboard.html';
    if (role === 'admin')   redirectTo = '/admin.html';
    if (role === 'editor')  redirectTo = '/verify.html';

    setTimeout(() => { window.location.href = redirectTo; }, 1500);

  } catch(e) {
    console.error('Confirmation error:', e);
    showError('Something went wrong. Please try logging in.');
  }
}

function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }
function showError(msg) {
  hide('state-loading');
  show('state-error');
  if (msg) document.getElementById('error-msg').textContent = msg;
}

init();
</script>
</body>
</html>
