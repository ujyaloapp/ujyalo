<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — Ujyalo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles/main.css">
</head>
<body>
<div id="site-nav"></div>
<div style="padding:60px 0 80px;background:var(--ink-50);">
  <div class="container-tiny animate-up">
    <div class="card" style="padding:32px;">

      <!-- Step 1: Enter email -->
      <div id="step-form">
        <h3 class="font-display" style="font-size:22px;font-weight:600;margin-bottom:6px;">Forgot your password?</h3>
        <p class="text-muted mb-6" style="font-size:14px;">Enter your email and we'll send you a link to reset it.</p>

        <div id="error-msg" class="hidden" style="background:#FEE2E2;border:1px solid #FECACA;border-radius:var(--radius-md);padding:12px 16px;margin-bottom:16px;font-size:14px;color:#B91C1C;"></div>

        <div class="field">
          <label>Email address</label>
          <input type="email" class="input" id="input-email" placeholder="rajan@example.com">
        </div>

        <button class="btn btn-blue btn-block" id="submit-btn" onclick="sendReset()">
          Send reset link →
        </button>

        <p class="text-muted text-center mt-6" style="font-size:13px;">
          <a href="/login.html" style="color:var(--brand);font-weight:500;">← Back to login</a>
        </p>
      </div>

      <!-- Step 2: Success message -->
      <div id="step-success" class="hidden" style="text-align:center;padding:16px 0;">
        <div style="font-size:48px;margin-bottom:16px;">📧</div>
        <h3 class="font-display" style="font-size:22px;font-weight:600;margin-bottom:8px;">Check your email</h3>
        <p class="text-muted" style="font-size:14px;line-height:1.6;margin-bottom:24px;">
          We've sent a password reset link to <strong id="sent-to-email"></strong>.<br>
          Check your inbox and click the link to reset your password.
        </p>
        <p class="text-muted" style="font-size:12px;">
          Didn't get it? Check your spam folder, or
          <a href="#" onclick="showForm()" style="color:var(--brand);">try again</a>.
        </p>
      </div>

    </div>
  </div>
</div>
<div id="site-footer"></div>
<script src="/scripts/components.js"></script>
<script>
async function sendReset() {
  const email = document.getElementById('input-email').value.trim();
  const btn   = document.getElementById('submit-btn');
  hideError();

  if (!email) { showError('Please enter your email address.'); return; }

  btn.disabled = true;
  btn.textContent = 'Sending...';

  try {
    const res = await fetch('/api/auth-forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const data = await res.json();

    // Always show success — don't reveal if email exists or not (security best practice)
    document.getElementById('sent-to-email').textContent = email;
    document.getElementById('step-form').classList.add('hidden');
    document.getElementById('step-success').classList.remove('hidden');

  } catch (e) {
    showError('Something went wrong. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Send reset link →';
  }
}

function showForm() {
  document.getElementById('step-success').classList.add('hidden');
  document.getElementById('step-form').classList.remove('hidden');
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('submit-btn').textContent = 'Send reset link →';
}

function showError(msg) { const e = document.getElementById('error-msg'); e.textContent = msg; e.classList.remove('hidden'); }
function hideError() { document.getElementById('error-msg').classList.add('hidden'); }
</script>
</body>
</html>
